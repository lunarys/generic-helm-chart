suite: Test Services Template

templates:
  - services.yaml

tests:
  - it: should not render when services are disabled
    set:
      services:
        test:
          enabled: false
          type: ClusterIP
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
    asserts:
      - hasDocuments:
          count: 0

  - it: should render single service when enabled
    set:
      services:
        test:
          enabled: true
          type: ClusterIP
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-test
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should render multiple services when enabled
    set:
      services:
        web:
          enabled: true
          type: ClusterIP
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
        api:
          enabled: true
          type: NodePort
          ports:
            rest:
              enabled: true
              protocol: TCP
              port: 3000
              targetPort: 3000
    asserts:
      - hasDocuments:
          count: 2

  - it: should set correct service type
    set:
      services:
        test:
          enabled: true
          type: NodePort
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
    asserts:
      - equal:
          path: spec.type
          value: NodePort

  - it: should render enabled ports only
    set:
      services:
        test:
          enabled: true
          type: ClusterIP
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
            https:
              enabled: false
              protocol: TCP
              port: 443
              targetPort: 8443
            metrics:
              enabled: true
              protocol: TCP
              port: 9090
              targetPort: 9090
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 2
      - contains:
          path: spec.ports
          content:
            name: http
            protocol: TCP
            port: 80
            targetPort: 8080
      - contains:
          path: spec.ports
          content:
            name: metrics
            protocol: TCP
            port: 9090
            targetPort: 9090

  - it: should set correct port properties
    set:
      services:
        test:
          enabled: true
          type: ClusterIP
          ports:
            custom:
              enabled: true
              protocol: UDP
              port: 5432
              targetPort: 54321
    asserts:
      - equal:
          path: spec.ports[0].name
          value: custom
      - equal:
          path: spec.ports[0].protocol
          value: UDP
      - equal:
          path: spec.ports[0].port
          value: 5432
      - equal:
          path: spec.ports[0].targetPort
          value: 54321

  # LB IPAM cases (replaces old externalIPs cases)

  # Case 1: loadBalancerIPs → LB
  - it: "loadBalancerIPs sets type LoadBalancer, annotation, pool label, no externalIPs"
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
          loadBalancerIPs:
            - 10.0.4.5
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer
      - equal:
          path: metadata.annotations["lbipam.cilium.io/ips"]
          value: "10.0.4.5"
      - equal:
          path: metadata.labels["custom.network/lb-pool"]
          value: "static"
      - notExists:
          path: spec.externalIPs

  # Case 2: externalIPs fallback
  - it: "externalIPs fallback produces same LB output, no spec.externalIPs"
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
          externalIPs:
            - 10.0.4.5
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer
      - equal:
          path: metadata.annotations["lbipam.cilium.io/ips"]
          value: "10.0.4.5"
      - equal:
          path: metadata.labels["custom.network/lb-pool"]
          value: "static"
      - notExists:
          path: spec.externalIPs

  # Case 3: loadBalancerIPs wins over externalIPs
  - it: "loadBalancerIPs takes precedence over externalIPs"
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
          loadBalancerIPs:
            - 10.0.4.9
          externalIPs:
            - 10.0.4.5
    asserts:
      - equal:
          path: metadata.annotations["lbipam.cilium.io/ips"]
          value: "10.0.4.9"

  # Case 4: dual-stack auto-detect
  - it: "dual-stack auto-detect sets ipFamilyPolicy and ipFamilies"
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
          loadBalancerIPs:
            - 10.0.4.2
            - "fda0:f54f:5876::4:2"
    asserts:
      - equal:
          path: metadata.annotations["lbipam.cilium.io/ips"]
          value: "10.0.4.2,fda0:f54f:5876::4:2"
      - equal:
          path: spec.ipFamilyPolicy
          value: RequireDualStack
      - equal:
          path: spec.ipFamilies
          value:
            - IPv4
            - IPv6

  # Case 5: single family → no ipFamilyPolicy
  - it: "single IP family produces no ipFamilyPolicy"
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
          loadBalancerIPs:
            - 10.0.4.5
    asserts:
      - notExists:
          path: spec.ipFamilyPolicy

  # Case 6: user annotations/labels merge
  - it: "user annotations and labels merge with auto-derived ones"
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
          loadBalancerIPs:
            - 10.0.4.5
          annotations:
            foo: bar
          labels:
            baz: qux
    asserts:
      - equal:
          path: metadata.annotations["lbipam.cilium.io/ips"]
          value: "10.0.4.5"
      - equal:
          path: metadata.annotations["foo"]
          value: "bar"
      - equal:
          path: metadata.labels["custom.network/lb-pool"]
          value: "static"
      - equal:
          path: metadata.labels["baz"]
          value: "qux"

  # Case 7: user ipFamilyPolicy overrides auto dual-stack
  - it: "user ipFamilyPolicy wins over auto dual-stack detection"
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
          loadBalancerIPs:
            - 10.0.4.2
            - "fda0:f54f:5876::4:2"
          ipFamilyPolicy: SingleStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: SingleStack

  # Case 7b: user ipFamilies passthrough wins without an explicit ipFamilyPolicy
  - it: "user ipFamilies is honored verbatim without setting ipFamilyPolicy"
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
          loadBalancerIPs:
            - 10.0.4.5
          ipFamilies:
            - IPv4
    asserts:
      - equal:
          path: spec.ipFamilies
          value:
            - IPv4
      - notExists:
          path: spec.ipFamilyPolicy

  # Case 8: no IPs → default type (ClusterIP), clean
  - it: "no IPs keeps default ClusterIP type and omits LB fields"
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP
      - notExists:
          path: metadata.annotations["lbipam.cilium.io/ips"]
      - notExists:
          path: spec.externalIPs
      - notExists:
          path: spec.ipFamilyPolicy

  - it: should include correct labels
    set:
      services:
        test:
          enabled: true
          type: ClusterIP
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
    asserts:
      - exists:
          path: metadata.labels
      - exists:
          path: spec.selector

  - it: should handle multiple ports with different protocols
    set:
      services:
        test:
          enabled: true
          type: ClusterIP
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
            dns:
              enabled: true
              protocol: UDP
              port: 53
              targetPort: 53
            grpc:
              enabled: true
              protocol: TCP
              port: 9000
              targetPort: 9000
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 3
      - contains:
          path: spec.ports
          content:
            name: http
            protocol: TCP
            port: 80
            targetPort: 8080
      - contains:
          path: spec.ports
          content:
            name: dns
            protocol: UDP
            port: 53
            targetPort: 53
      - contains:
          path: spec.ports
          content:
            name: grpc
            protocol: TCP
            port: 9000
            targetPort: 9000

  - it: should handle mixed enabled and disabled services
    set:
      services:
        web:
          enabled: true
          type: ClusterIP
          ports:
            http:
              enabled: true
              protocol: TCP
              port: 80
              targetPort: 8080
        api:
          enabled: false
          type: ClusterIP
          ports:
            rest:
              enabled: true
              protocol: TCP
              port: 3000
              targetPort: 3000
        database:
          enabled: true
          type: ClusterIP
          ports:
            postgres:
              enabled: true
              protocol: TCP
              port: 5432
              targetPort: 5432
    asserts:
      - hasDocuments:
          count: 2

  - it: should have default service type as ClusterIP
    set:
      services:
        test:
          enabled: true
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should enable ports by default with minimal config
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              port: 80
    asserts:
      - isNotEmpty:
          path: spec.ports
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].name
          value: http

  - it: should use default protocol
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              port: 80
    asserts:
      - equal: 
          path: spec.ports[0].protocol
          value: TCP

  - it: should use port as default targetPort
    set:
      services:
        test:
          enabled: true
          ports:
            http:
              port: 80123
    asserts:
      - equal:
          path: spec.ports[0].targetPort
          value: 80123
