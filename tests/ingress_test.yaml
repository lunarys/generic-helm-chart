suite: Ingress rendering

templates:
  - templates/ingress.yaml

set:
  service:
    name: "my-backend"
    port: 8080

tests:
  - it: should render an internal Ingress resource when enabled
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: test.example.com
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: RELEASE-NAME-internal
      - equal:
          path: spec.rules[0].host
          value: test.example.com
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: my-backend
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080

  - it: should not render ingress when disabled
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set internal ingressClassName from ingress.className
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: "custom"
      ingress.host: test.example.com
    asserts:
      - documentIndex: 0
        equal:
          path: spec.ingressClassName
          value: custom

  - it: should set internal ingressClassName from global.baseSettings.ingress.internalClassName
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: test.example.com
      global.baseSettings.ingress.internalClassName: "custom"
    asserts:
      - documentIndex: 0
        equal:
          path: spec.ingressClassName
          value: custom

  - it: should prefer ingress.className over global.baseSettings.ingress.internalClassName
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: "override"
      ingress.host: test.example.com
      global.baseSettings.ingress.internalClassName: "default"
    asserts:
      - documentIndex: 0
        equal:
          path: spec.ingressClassName
          value: override

  - it: should use default internalClassName when ingress.className is not set
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: test.example.com
    asserts:
      - documentIndex: 0
        equal:
          path: spec.ingressClassName
          value: traefik

  - it: should set external ingressClassName from ingress.external.className
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: external.example.com
      ingress.external.className: "custom-external"
    asserts:
      - documentIndex: 1
        equal:
          path: spec.ingressClassName
          value: custom-external

  - it: should set external ingressClassName from global.baseSettings.ingress.externalClassName
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: external.example.com
      global.baseSettings.ingress.externalClassName: "custom-external"
    asserts:
      - documentIndex: 1
        equal:
          path: spec.ingressClassName
          value: custom-external

  - it: should not bleed ingress.className to external ingress
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: "custom-internal"
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: external.example.com
    asserts:
      - documentIndex: 0
        equal:
          path: spec.ingressClassName
          value: custom-internal
      - documentIndex: 1
        equal:
          path: spec.ingressClassName
          value: traefik-external

  - it: should use default externalClassName when ingress.external.className is not set
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: external.example.com
    asserts:
      - documentIndex: 1
        equal:
          path: spec.ingressClassName
          value: traefik-external

  - it: should use service port when explicit servicePort not specified
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: test.example.com
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080

  - it: should render two documents when external is enabled
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: "external.example.com"
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: spec.rules[0].host
          value: internal.example.com
      - documentIndex: 1
        equal:
          path: spec.rules[0].host
          value: external.example.com

  - it: should configure path and pathType
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: test.example.com
      ingress.path: "/api"
      ingress.pathType: "Exact"
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /api
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Exact

  - it: should add custom annotations to internal ingress
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: test.example.com
      ingress.annotations:
        custom.annotation/test: "value"
        another.annotation: "another-value"
    asserts:
      - equal:
          path: metadata.annotations["custom.annotation/test"]
          value: value
      - equal:
          path: metadata.annotations["another.annotation"]
          value: another-value

  - it: should not set middleware annotation by default
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: "external.example.com"
    asserts:
      - documentIndex: 0
        notExists:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
      - documentIndex: 1
        notExists:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]

  - it: should set middleware on internal ingress only
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: "external.example.com"
      ingress.traefik.middlewares: "internal-middleware@kubernetescrd"
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
          value: "internal-middleware@kubernetescrd"
      - documentIndex: 1
        notExists:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]

  - it: should set middleware on external ingress only
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: "external.example.com"
      ingress.external.traefik.middlewares: "external-middleware@kubernetescrd"
    asserts:
      - documentIndex: 0
        notExists:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
      - documentIndex: 1
        equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
          value: "external-middleware@kubernetescrd"

  - it: should create external ingress with correct service on both ingresses
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: external.example.com
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        equal:
          path: spec.rules[0].host
          value: internal.example.com
      - documentIndex: 1
        equal:
          path: spec.rules[0].host
          value: external.example.com
      - documentIndex: 0
        equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: test-service
      - documentIndex: 1
        equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: test-service

  - it: should use global ingress host when local host not set
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      global.ingress.host: global.example.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: global.example.com

  - it: should prefer local host over global host
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: local.example.com
      global.ingress.host: global.example.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: local.example.com

  - it: should use default ingress.path and ingress.pathType if not set
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix

  # External ingress validation

  - it: should fail when external.enabled is true and external.host is empty
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: ""
    asserts:
      - failedTemplate:
          errorMessage: "ingress.external.host must be set when ingress.external.enabled is true"

  - it: should fail when external.host equals internal host
    set:
      ingress.enabled: true
      ingress.host: same.example.com
      ingress.external.enabled: true
      ingress.external.host: same.example.com
    asserts:
      - failedTemplate:
          errorMessage: "ingress.external.host must differ from the internal host (ingress.host)"

  # External ingress annotations

  - it: ingress.external.annotations should appear only on the external ingress
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: external.example.com
      ingress.external.annotations:
        external.annotation: "external-value"
    asserts:
      - documentIndex: 1
        equal:
          path: metadata.annotations["external.annotation"]
          value: external-value
      - documentIndex: 0
        notExists:
          path: metadata.annotations["external.annotation"]

  - it: ingress.annotations should not leak into the external ingress
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.annotations:
        internal.annotation: "internal-value"
      ingress.external.enabled: true
      ingress.external.host: external.example.com
    asserts:
      - documentIndex: 0
        equal:
          path: metadata.annotations["internal.annotation"]
          value: internal-value
      - documentIndex: 1
        notExists:
          path: metadata.annotations["internal.annotation"]

  # TLS tests — internal and external are fully independent

  - it: should not add TLS when disabled
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: test.example.com
      ingress.tls.enabled: false
    asserts:
      - notExists:
          path: spec.tls
      - notExists:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]

  - it: should add TLS to internal ingress when ingress.tls.enabled
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: test.example.com
      ingress.tls.enabled: true
      ingress.tls.clusterIssuer: "letsencrypt-prod"
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: "letsencrypt-prod"
      - equal:
          path: spec.tls[0].hosts[0]
          value: test.example.com
      - equal:
          path: spec.tls[0].secretName
          value: RELEASE-NAME-internal-cert

  - it: should not add TLS to external ingress when only ingress.tls.enabled is set
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.tls.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: "external.example.com"
      ingress.external.tls.enabled: false
    asserts:
      - documentIndex: 1
        notExists:
          path: spec.tls
      - documentIndex: 1
        notExists:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]

  - it: should add TLS to external ingress when ingress.external.tls.enabled
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: "external.example.com"
      ingress.external.tls.enabled: true
      ingress.external.tls.clusterIssuer: "letsencrypt-prod"
    asserts:
      - documentIndex: 1
        equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: "letsencrypt-prod"
      - documentIndex: 1
        equal:
          path: spec.tls[0].hosts[0]
          value: external.example.com
      - documentIndex: 1
        equal:
          path: spec.tls[0].secretName
          value: RELEASE-NAME-external-cert

  - it: should not add TLS to internal ingress when only ingress.external.tls.enabled is set
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.tls.enabled: false
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: "external.example.com"
      ingress.external.tls.enabled: true
    asserts:
      - documentIndex: 0
        notExists:
          path: spec.tls
      - documentIndex: 0
        notExists:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]

  - it: should use global.baseSettings.tls.internalClusterIssuer for internal ingress
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: test.example.com
      ingress.tls.enabled: true
      global.baseSettings.tls.internalClusterIssuer: "internal-issuer"
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: "internal-issuer"

  - it: should use global.baseSettings.tls.externalClusterIssuer for external ingress
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: "external.example.com"
      ingress.external.tls.enabled: true
      global.baseSettings.tls.externalClusterIssuer: "external-issuer"
    asserts:
      - documentIndex: 1
        equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: "external-issuer"

  - it: should use global.baseSettings.tls.clusterIssuer as fallback for internal ingress
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: test.example.com
      ingress.tls.enabled: true
      global.baseSettings.tls.internalClusterIssuer: ""
      global.baseSettings.tls.clusterIssuer: "generic-issuer"
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: "generic-issuer"

  - it: should use global.baseSettings.tls.clusterIssuer as fallback for external ingress
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: "external.example.com"
      ingress.external.tls.enabled: true
      global.baseSettings.tls.clusterIssuer: "generic-issuer"
      global.baseSettings.tls.externalClusterIssuer: ""
    asserts:
      - documentIndex: 1
        equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: "generic-issuer"

  - it: should allow ingress.tls.clusterIssuer to override global baseSettings for internal ingress
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.tls.enabled: true
      ingress.tls.clusterIssuer: "chart-internal-issuer"
      ingress.host: test.example.com
      global.baseSettings.tls.internalClusterIssuer: "global-internal-issuer"
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: "chart-internal-issuer"

  - it: should allow ingress.external.tls.clusterIssuer to override global baseSettings for external ingress
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: internal.example.com
      ingress.external.enabled: true
      ingress.external.host: "external.example.com"
      ingress.external.tls.enabled: true
      ingress.external.tls.clusterIssuer: "chart-external-issuer"
      global.baseSettings.tls.externalClusterIssuer: "global-external-issuer"
    asserts:
      - documentIndex: 1
        equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: "chart-external-issuer"
