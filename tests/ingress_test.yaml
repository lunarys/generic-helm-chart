suite: Ingress rendering

templates:
  - templates/ingress.yaml

set:
  service:
    name: "my-backend"
    port: 8080

tests:
  - it: should render an Ingress resource when enabled
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: test.example.com
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: RELEASE-NAME
      - equal:
          path: spec.rules[0].host
          value: test.example.com
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: my-backend
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080

  - it: should not render ingress when disabled
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set ingress class name when specified
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: "nginx"
      ingress.host: test.example.com
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should not set ingress class name when empty
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.className: ""
      ingress.host: test.example.com
    asserts:
      - notExists:
          path: spec.ingressClassName

  - it: should use service port not specified
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      ingress.host: test.example.com
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080

  - it: should render external host rule when externalAccessAllowed is true and hosts differ
    set:
      ingress.enabled: true
      ingress.accessControl.externalAccessAllowed: true
      ingress.accessControl.externalHost: "external.example.com"
      ingress.accessControl.internalHost: "internal.example.com"
    asserts:
      - equal:
          path: spec.rules[0].host
          value: internal.example.com
      - equal:
          path: spec.rules[1].host
          value: external.example.com

  - it: should configure path and pathType
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: test.example.com
      ingress.path: "/api"
      ingress.pathType: "Exact"
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /api
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Exact

  - it: should use default path and pathType when not specified
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: test.example.com
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix

  - it: should add custom annotations
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: test.example.com
      ingress.annotations:
        custom.annotation/test: "value"
        another.annotation: "another-value"
    asserts:
      - equal:
          path: metadata.annotations["custom.annotation/test"]
          value: value
      - equal:
          path: metadata.annotations["another.annotation"]
          value: another-value

  - it: should add middleware annotation for internal access by default
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: test.example.com
    asserts:
      - equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
          value: "traefik-common-internal-access-allowlist@kubernetescrd"

  - it: should not add middleware annotation when external access is allowed
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: test.example.com
      ingress.accessControl.externalAccessAllowed: true
    asserts:
      - notExists:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]

  - it: should create external host rule when external access is allowed and hosts differ
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: internal.example.com
      ingress.accessControl.externalAccessAllowed: true
      ingress.accessControl.externalHost: external.example.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: internal.example.com
      - equal:
          path: spec.rules[1].host
          value: external.example.com
      - equal:
          path: spec.rules[1].http.paths[0].backend.service.name
          value: test-service

  - it: should not create external host rule when external access is allowed but hosts are same
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: same.example.com
      ingress.accessControl.externalAccessAllowed: true
      ingress.accessControl.externalHost: same.example.com
      ingress.accessControl.internalHost: same.example.com
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 1

  - it: should use global ingress host when local host not set
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      global.ingress.host: global.example.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: global.example.com

  - it: should prefer local host over global host
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: local.example.com
      global.ingress.host: global.example.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: local.example.com

  - it: should use custom internal access allowlist name
    templates:
      - templates/ingress.yaml
    set:
      ingress.enabled: true
      service.name: test-service
      service.port: 8080
      ingress.host: test.example.com
      ingress.accessControl.internalAccessAllowListName: "custom-allowlist@kubernetescrd"
    asserts:
      - equal:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]
          value: "custom-allowlist@kubernetescrd"

  - it: should not set middlewares annotation when external access is allowed and no other middlewares
    set:
      ingress.enabled: true
      ingress.accessControl.externalAccessAllowed: true
      ingress.accessControl.internalAccessAllowListName: ""
    asserts:
      - notExists:
          path: metadata.annotations["traefik.ingress.kubernetes.io/router.middlewares"]

  - it: should use default ingress.path and ingress.pathType if not set  
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
