suite: longhornstorage mount in deployment

templates:
  - templates/deployment.yaml

tests:
  - it: should render longhornstorage volumeMount and volume with correct values when enabled and subPath is set
    set:
      longhornstorage:
        enabled: true
        volumes:
          main:
            enabled: true
            size: "1Gi"
            name: "my-cluster-pvc"
            mount:
              enabled: true
              path: /cluster-data
              readonly: true
              subPath: "myclusterfolder"
    asserts:
      - exists:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")]
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")].mountPath
          value: /cluster-data
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")].readOnly
          value: true
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")].subPath
          value: myclusterfolder
      - exists:
          path: spec.template.spec.volumes[?(@.name=="longhorn-main")]
      - equal:
          path: spec.template.spec.volumes[?(@.name=="longhorn-main")].persistentVolumeClaim.claimName
          value: my-cluster-pvc

  - it: should render longhornstorage volumeMount and volume with correct values when enabled and subPath is not set
    set:
      longhornstorage:
        enabled: true
        volumes:
          main:
            enabled: true
            size: "1Gi"
            name: "my-cluster-pvc"
            mount:
              enabled: true
              path: /cluster-data
              readonly: false
    asserts:
      - exists:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")]
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")].mountPath
          value: /cluster-data
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")].readOnly
          value: false
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")].subPath
      - exists:
          path: spec.template.spec.volumes[?(@.name=="longhorn-main")]
      - equal:
          path: spec.template.spec.volumes[?(@.name=="longhorn-main")].persistentVolumeClaim.claimName
          value: my-cluster-pvc

  - it: should not render longhornstorage volumeMount and volume when disabled
    set:
      longhornstorage:
        enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")]
      - notExists:
          path: spec.template.spec.volumes[?(@.name=="longhorn-main")]

  - it: should not render longhornstorage volumeMount and volume when mount.enabled is false
    set:
      longhornstorage:
        enabled: true
        volumes:
          main:
            enabled: true
            size: "1Gi"
            mount:
              enabled: false
              path: /cluster-data
              readonly: true
              subPath: "myclusterfolder"
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")]
      - notExists:
          path: spec.template.spec.volumes[?(@.name=="longhorn-main")]

  - it: should render multiple longhornstorage volumes when enabled
    set:
      longhornstorage:
        enabled: true
        volumes:
          data:
            enabled: true
            size: "5Gi"
            mount:
              enabled: true
              path: /app/data
              readonly: false
          logs:
            enabled: true
            size: "1Gi"
            mount:
              enabled: true
              path: /app/logs
              readonly: false
    asserts:
      - exists:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-data")]
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-data")].mountPath
          value: /app/data
      - exists:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-logs")]
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-logs")].mountPath
          value: /app/logs
      - exists:
          path: spec.template.spec.volumes[?(@.name=="longhorn-data")]
      - exists:
          path: spec.template.spec.volumes[?(@.name=="longhorn-logs")]

  - it: should render longhornstorage volumeMount when mount.enabled is unset but path is set
    set:
      longhornstorage:
        volumes:
          main:
            size: "1Gi"
            mount:
              path: /cluster-data
              # enabled: not set - should default to true
    asserts:
      - exists:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")]
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[?(@.name=="longhorn-main")].mountPath
          value: /cluster-data
      - exists:
          path: spec.template.spec.volumes[?(@.name=="longhorn-main")]