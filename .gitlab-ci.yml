include:
  - component: $CI_SERVER_FQDN/to-be-continuous/helm/gitlab-ci-helm@8.2.0
    inputs:
      repos: ""

helm-unittest:
  #extends: .helm-base
  stage: test
  image: 
    name: helmunittest/helm-unittest
    entrypoint: [""]
  needs:
    - job: helm-lint
      artifacts: false
  script:
    - helm unittest . --with-subchart=false --output-type JUnit --output-file helmunittest.junit.xml

    - |
      for dir in charts/*; do
        if [ -d "$dir" ] && [ -d "$dir/tests" ]; then
          echo "Running helm unittest for $dir"
          helm unittest "$dir" --with-subchart=false --output-type JUnit --output-file "helmunittest-$(basename "$dir").junit.xml"
        else
          echo "WARN: there seem to be no tests in $dir"
        fi
      done

  after_script:
    - ls -al
    - ls -al charts/traefik-config

  artifacts:
    reports:
      junit: helmunittest*.junit.xml
