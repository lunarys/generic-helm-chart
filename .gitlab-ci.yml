include:
  - component: $CI_SERVER_FQDN/to-be-continuous/helm/gitlab-ci-helm@8.2.0
    inputs:
      repos: ""

helm-unittest:
  #extends: .helm-base
  stage: test
  image: 
    name: helmunittest/helm-unittest
    entrypoint: [""]
  needs:
    - job: helm-lint
      artifacts: false
  script:
    - helm unittest . --output-type JUnit --output-file helmunittest.junit.xml
  artifacts:
    reports:
      junit: helmunittest.junit.xml
