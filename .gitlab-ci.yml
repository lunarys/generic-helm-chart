variables:
  HELM_CHART_DIRECTORY: "."
  SEMREL_RELEASE_DISABLED: false
  SEMREL_INFO_ON: all

include:
  - component: $CI_SERVER_FQDN/to-be-continuous/helm/gitlab-ci-helm@8.2.0
    inputs:
      repos: ""
      publish-on: tag
      publish-strategy: none
      chart-dir: "$HELM_CHART_DIRECTORY"
  - component: $CI_SERVER_FQDN/to-be-continuous/semantic-release/gitlab-ci-semrel@3.15.0
    inputs:
      commit-spec: "conventionalcommits"
      #info-on: all
      auto-release-enabled: true



helm-unittest:
  #extends: .helm-base
  stage: test
  image: 
    name: helmunittest/helm-unittest
    entrypoint: [""]
  needs:
    - job: helm-lint
      artifacts: false
  script:
    - helm unittest "$HELM_CHART_DIRECTORY" --with-subchart=false --output-type JUnit --output-file helmunittest.junit.xml

    - |
      for dir in charts/*; do
        if [ -d "$dir" ] && [ -d "$dir/tests" ]; then
          echo "Running helm unittest for $dir"
          helm unittest "$dir" --with-subchart=false --output-type JUnit --output-file "helmunittest-$(basename "$dir").junit.xml"
        else
          echo "WARN: there seem to be no tests in $dir"
        fi
      done

  artifacts:
    reports:
      junit: helmunittest*.junit.xml


# for tag pipelines, trigger a build of the child charts
build-child:
  stage: publish
  trigger:
    include: .gitlab-ci.yml
    strategy: depend
  variables:
    SEMREL_RELEASE_DISABLED: true
    SEMREL_INFO_ON: ""
  parallel:
    matrix:
      - HELM_CHART_DIRECTORY: "charts/external-secrets"
  rules:
    #- if: $CI_COMMIT_TAG && $CI_PIPELINE_SOURCE != "parent_pipeline"
    - if: $TRIGGER_CHILD_PIPELINES == "true" && $CI_PIPELINE_SOURCE != "parent_pipeline"
    - if: $CI_PIPELINE_SOURCE != "parent_pipeline"
    
