{{- range $name, $service := .Values.services }}
{{- if $service.enabled }}
{{- $svcCtx := dict "svc" $service "ctx" $ }}
{{- $resolvedType := include "ju-common.service.resolvedType" $svcCtx }}
{{- $annotations := include "ju-common.service.annotations" $svcCtx }}
{{- $extraLabels := include "ju-common.service.extraLabels" $svcCtx }}
{{- $ipFamily := include "ju-common.service.ipFamily" $svcCtx }}
{{- $allocNodePorts := include "ju-common.service.allocateNodePorts" (dict "svc" $service "resolvedType" $resolvedType) }}
---
kind: Service
apiVersion: v1
metadata:
  name: {{ include "ju-common.serviceName" $ }}-{{ $name }}
  labels:
    {{- include "ju-common.labels" $ | nindent 4 }}
    {{- if $extraLabels }}
    {{- $extraLabels | nindent 4 }}
    {{- end }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ $resolvedType }}
  {{- if $allocNodePorts }}
  {{ $allocNodePorts | nindent 2 | trim }}
  {{- end }}
  {{- if $ipFamily }}
  {{ $ipFamily | nindent 2 | trim }}
  {{- end }}
  ports:
    {{- range $portName, $port := $service.ports }}
    {{- if or (not (hasKey $port "enabled")) $port.enabled }}
    - name: {{ $portName }}
      protocol: {{ $port.protocol | default "TCP" }}
      port: {{ $port.port | required "port for a service in services is missing" }}
      targetPort: {{ $port.targetPort | default $port.port }}
    {{- end }}
    {{- end }}
  selector:
    {{- include "ju-common.selectorLabels" $ | nindent 4 }}
{{- end }}
{{- end }}
