{{- if .Values.config.values }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.name | default (printf "%s-config" (include "ju-common.fullname" .)) }}
data:
{{- range $key, $value := .Values.config.values }}
  {{ $key }}: |-
    {{- if kindIs "map" $value }}
      {{- $value | toYaml | nindent 4 }}
    {{- else }}
      {{- $value | nindent 4 }}
    {{- end }}
{{- end }}
{{- end }}
