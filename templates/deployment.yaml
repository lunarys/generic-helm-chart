apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
  {{- include "ju-common.labels" . | nindent 4 }}
  name: {{ include "ju-common.fullname" . }}
spec:
  {{- if not .Values.autoscale.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "ju-common.selectorLabels" . | nindent 6 }}
  {{- if .Values.update.strategy }}
  strategy:
    {{- toYaml .Values.update.strategy | nindent 4 }}
  {{- end }}
  template:
    metadata:
      annotations:
        {{- include "ju-common.annotations" . | nindent 8 }}
        {{- if .Values.prometheus.enabled }}
        prometheus.io/scrape: 'true'
        prometheus.io/path: {{ required "prometheus.path must be set when prometheus.enabled is true" .Values.prometheus.path | quote }}
        prometheus.io/port: {{ .Values.prometheus.port | default (.Values.service.targetPort | toString) | quote }}
        {{- else }}
        prometheus.io/scrape: 'false'
        {{- end }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "ju-common.podLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "ju-common.podSecurityContext" . | nindent 8 }}
      {{- if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name | quote }}
      {{- end }}
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      containers:
        - name: {{ include "ju-common.fullname" . }}
          image: {{ include "ju-common.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.image.command }}
          command: {{- toYaml .Values.image.command | nindent 12 }}
          {{- end }}
          {{- if .Values.image.args }}
          args: {{- toYaml .Values.image.args | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- if and .limits (or .limits.memory .limits.cpu) }}
            limits:
              {{- if .limits.memory }}
              memory: {{ .limits.memory }}
              {{- end }}
              {{- if .limits.cpu }}
              cpu: {{ .limits.cpu }}
              {{- end }}
            {{- end }}
            {{- if and .requests (or .requests.memory .requests.cpu) }}
            requests:
              {{- if .requests.memory }}
              memory: {{ .requests.memory }}
              {{- end }}
              {{- if .requests.cpu }}
              cpu: {{ .requests.cpu }}
              {{- end }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- include "ju-common.containerSecurityContext" . | nindent 12 }}
          #readiness & liveness
          {{- if .Values.livenessProbe.enabled }}
          {{- if .Values.livenessProbe.override }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe.override | nindent 12 }}
          {{- else }}
          livenessProbe:
            {{- if .Values.livenessProbe.http.port }}
            httpGet:
              path: {{ .Values.livenessProbe.http.path | default "/" }}
              port: {{ .Values.livenessProbe.http.port }}
            {{- else if .Values.livenessProbe.tcp.port }}
            tcpSocket:
              port: {{ .Values.livenessProbe.tcp.port }}
            {{- else if .Values.livenessProbe.exec.command }}
            exec:
              command: {{- toYaml .Values.livenessProbe.exec.command | nindent 16 }}
            {{- end }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          {{- if .Values.readinessProbe.override }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe.override | nindent 12 }}
          {{- else }}
          readinessProbe:
            {{- if .Values.readinessProbe.http.port }}
            httpGet:
              path: {{ .Values.readinessProbe.http.path | default "/" }}
              port: {{ .Values.readinessProbe.http.port }}
            {{- else if .Values.readinessProbe.tcp.port }}
            tcpSocket:
              port: {{ .Values.readinessProbe.tcp.port }}
            {{- else if .Values.readinessProbe.exec.command }}
            exec:
              command: {{- toYaml .Values.readinessProbe.exec.command | nindent 16 }}
            {{- end }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- end }}
          ports:
            {{- if .Values.service.enabled }}
            - containerPort: {{ .Values.service.targetPort }}
              name: default
              protocol: {{ .Values.service.protocol }}
            {{- end }}
            {{- range $name, $service := .Values.services }}
              {{- if $service.enabled }}
                {{- range $portName, $port := $service.ports }}
                  {{- if or (not (hasKey $port "enabled")) $port.enabled }}
            - containerPort: {{ $port.targetPort | default $port.port }}
              name: {{ $portName }}
              protocol: {{ $port.protocol | default "TCP" }}
                  {{- end }}
                {{- end }}
              {{- end }}
            {{- end }}
          #config values that comes from the configmap 
          envFrom:
            {{- with .Values.externalsecrets }}
            {{- if .enabled }}
            {{- if .mount.env }}
            - secretRef:
                name: {{ default (printf "%s-external-secret" $.Release.Name) .name }}
            {{- end }}
            {{- range $key, $value := .secrets }}
            {{- if and (or (not (hasKey $value "enabled")) $value.enabled) (or (not (hasKey $value "mount")) $value.mount.env) }}
            - secretRef:
                name: {{ default $key $value.name }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range .Values.extraConfig.secrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.extraConfig.configmaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
            {{- with .Values.extraConfig.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if and .Values.config.enabled .Values.config.values .Values.config.mount.env }}
            - configMapRef:
                name: {{ .Values.config.name | default (printf "%s-config" (include "ju-common.fullname" .)) }}
            {{- end }}
          env:
            {{- if .Values.env }}
            # settings from 'env'
            {{- range $name, $value := .Values.env }}
            - name: {{ default $name | quote }}
              {{- if kindIs "map" $value }}
              {{- omit $value "name" | toYaml | nindent 14 }}
              {{- else }}
              value: {{ $value | toString | quote }}
              {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.extraConfig.env }}
            # Deprecated variable settings from 'extraConfig.env'
              {{- .Values.extraConfig.env | toYaml | nindent 12 }}
            {{- end }}
            {{- if and .Values.postgresdb.enabled .Values.postgresdb.mount.enabled .Values.postgresdb.mount.env }}
            {{- range $secretKey, $envVarName := .Values.postgresdb.mount.env }}
            - name: {{ $envVarName | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresdb.secretName" $ }}
                  key: {{ $secretKey }}
            {{- end }}
            {{- end }}
          volumeMounts:
            {{- range .Values.extraConfig.volumeMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              readOnly: {{ .readOnly | default false }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
            {{- if .Values.smbstorage.enabled }}
            {{- include "smbstorage.volumeMounts" .Subcharts.smbstorage | nindent 12 }}
            {{- end }}
            {{- if .Values.longhornstorage.enabled }}
            {{- include "longhornstorage.volumeMounts" .Subcharts.longhornstorage | nindent 12 }}
            {{- end }}
            {{- if and .Values.config.enabled .Values.config.values (or .Values.config.mount.path .Values.config.mount.subPath) }}
            - name: config-values-mount-via-{{ if .Values.config.mount.subPath }}sub{{ end }}path
              mountPath: {{ if .Values.config.mount.path }}{{ .Values.config.mount.path }}{{ else }}{{ .Values.config.mount.subPath }}{{ end }}
              {{- if .Values.config.mount.subPath }}
              subPath: {{ .Values.config.values | keys | mustFirst }}
              {{- end }}
              readOnly: true
            {{- end }}
      volumes:
        {{- if and .Values.config.enabled .Values.config.values (or .Values.config.mount.path .Values.config.mount.subPath) }}
        - name: config-values-mount-via-{{ if .Values.config.mount.subPath }}sub{{ end }}path
          configMap:
            name: {{ .Values.config.name | default (printf "%s-config" (include "ju-common.fullname" .)) }}
          {{- if .Values.config.mount.subPath }}
            items:
              - key: {{ .Values.config.values | keys | mustFirst }}
                path: {{ .Values.config.values | keys | mustFirst }}
          {{- end }}
        {{- end }}
        {{- range .Values.extraConfig.volumeMounts }}
        {{- if not .existingVolume }}
        - name: {{ .name }}
          {{- if .hostPath }}
          hostPath:
            path: {{ .hostPath.path }}
            {{- if .hostPath.type }}
            type: {{ .hostPath.type | quote }}
            {{- end }}
          {{- else if or .configMap .secretName }}
          {{- if .secretName }}
          secret:
            secretName: {{ .secretName }}
          {{- else if .configMap }}
          configMap:
            name: {{ .configMap }}
          {{- end }}
            {{- if .items }}
            items:
              {{- range $v := .items }}
              - key: {{ $v.key }}
                path: {{ $v.path }}
              {{- end }}
            {{- end }}
          {{- else if .nfs }}
          nfs:
            server: {{ .nfs.server }}
            path: {{ .nfs.path }}
          {{- else if hasKey . "emptyDir" }}
          emptyDir:
            {{- if .emptyDir.sizeLimit }}
            sizeLimit: {{ .emptyDir.sizeLimit }}
            {{- end }}
            {{- if .emptyDir.medium }}
            medium: {{ .emptyDir.medium }}
            {{- end }}
          {{- else if .pvc }}
          persistentVolumeClaim:
            claimName: {{ .pvc }}
          {{- else }}
            {{- fail "Neither hostPath, secretName, configMap, nfs nor emptyDir or pvc is defined as volume. Maybe use 'existingVolume: true'?" -}}
          {{- end }}
        {{- end }}
        {{- end }}
        {{- if .Values.smbstorage.enabled }}
        {{- include "smbstorage.volumes" .Subcharts.smbstorage | nindent 8 }}
        {{- end }}
        {{- if .Values.longhornstorage.enabled }}
        {{- include "longhornstorage.volumes" .Subcharts.longhornstorage | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.initCopy.enabled }}
      initContainers:
        - name: copy-volume-data
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
            {{- if not .Values.initCopy.force }}
              # Exclude lost+found from the check
              if [ -z "$(ls -A /to | grep -v '^lost+found$')" ]; then
                echo "Target directory /to is empty, proceeding with copy."
                cp -dR /from/. /to/.
                echo "Copy completed."
              else
                echo "Target directory /to is not empty skipping copy."
              fi
            {{- else }}
              cp -dR /from/. /to/.
            {{- end }}
            {{- if .Values.initCopy.sleep }}
              sleep {{ .Values.initCopy.sleep }}
            {{- end }}
          volumeMounts:
            {{- if .Values.initCopy.fromVolume }}
            - name: {{ .Values.initCopy.fromVolume }}
            {{- else if index .Values.smbstorage.volumes "init-default" "enabled" }}
            - name: "smb-init-default"
            {{- else }}
              {{ fail "initCopy.fromVolume must be set or smbstorage.volumes.init-default.enabled" }}
            {{- end }}
              mountPath: /from
              readOnly: true
            - name: {{ .Values.initCopy.toVolume | required "initCopy.toVolume must be set" }}
              mountPath: /to
              readOnly: false
      {{- end }}
