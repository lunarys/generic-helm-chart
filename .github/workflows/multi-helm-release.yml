name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cycjimmy/semantic-release-action@v4
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  discover-charts:
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.new_release_published == 'true'
    outputs:
      charts: ${{ steps.find-charts.outputs.charts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find all charts
        id: find-charts
        run: |
          charts_json="[]"

          if [ -f "Chart.yaml" ]; then
            name=$(yq eval '.name' Chart.yaml)
            charts_json=$(echo "$charts_json" | jq -c --arg name "$name" '. + [{"name": $name, "path": "."}]')
          fi

          for chart_dir in charts/*/; do
            if [ -f "$chart_dir/Chart.yaml" ]; then
              name=$(yq eval '.name' "$chart_dir/Chart.yaml")
              charts_json=$(echo "$charts_json" | jq -c --arg name "$name" --arg path "$chart_dir" '. + [{"name": $name, "path": $path}]')
            fi
          done

          echo "charts=$charts_json" >> $GITHUB_OUTPUT
          echo "📦 Discovered charts:"
          echo "$charts_json" | jq '.'

  helm-publish:
    name: Package & Push Helm Charts
    runs-on: ubuntu-latest
    needs: [release, discover-charts]
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      packages: write
    strategy:
      matrix:
        chart: ${{ fromJson(needs.discover-charts.outputs.charts) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          SEMVER="${{ needs.release.outputs.new_release_version }}"
          cd "${{ matrix.chart.path }}"
          helm package . \
            --version "$SEMVER" \
            --app-version "$SEMVER"
          helm push "${{ matrix.chart.name }}-${SEMVER}.tgz" \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
          echo "✅ Published: oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/${{ matrix.chart.name }}:${SEMVER}"
