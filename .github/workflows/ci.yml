name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  discover-charts:
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.find-charts.outputs.charts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find all charts
        id: find-charts
        run: |
          charts_json="[]"

          if [ -f "Chart.yaml" ]; then
            name=$(yq eval '.name' Chart.yaml)
            charts_json=$(echo "$charts_json" | jq -c --arg name "$name" '. + [{"name": $name, "path": "."}]')
          fi

          for chart_dir in charts/*/; do
            if [ -f "$chart_dir/Chart.yaml" ]; then
              name=$(yq eval '.name' "$chart_dir/Chart.yaml")
              charts_json=$(echo "$charts_json" | jq -c --arg name "$name" --arg path "$chart_dir" '. + [{"name": $name, "path": $path}]')
            fi
          done

          echo "charts=$charts_json" >> $GITHUB_OUTPUT
          echo "📦 Discovered charts:"
          echo "$charts_json" | jq '.'

  helm-lint-and-test:
    runs-on: ubuntu-latest
    needs: discover-charts
    strategy:
      matrix:
        chart: ${{ fromJson(needs.discover-charts.outputs.charts) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.17.0'

      - name: Lint Helm chart
        run: |
          cd "${{ matrix.chart.path }}"
          helm lint .

      - name: Template Helm chart (dry-run)
        run: |
          cd "${{ matrix.chart.path }}"
          helm template test-release . --debug --dry-run

      - name: Install helm unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest

      - name: Run Helm unit tests
        run: |
          cd "${{ matrix.chart.path }}"
          if [ -d "tests" ]; then
            echo "🧪 Running unit tests for ${{ matrix.chart.name }}"
            helm unittest . --with-subchart=false --output-type JUnit --output-file helmunittest.xml
          else
            echo "⚠️  No tests directory found for ${{ matrix.chart.name }}"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.chart.name }}
          path: ${{ matrix.chart.path }}/helmunittest.xml
          if-no-files-found: ignore
          retention-days: 30
