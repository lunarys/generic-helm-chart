# -- image pull secret for pulling docker images into a kubernetes cluster. Not needed in our aeb clusters. Only needed for local development.
imagePullSecrets: []

global:
  ingress:
    # -- possibility to use global ingress host for all subcharts
    host: ""

  deployment:
    # -- Globally set policy for auto-restart if an ESecret used in deployments is changed.
    # May be overwritten by the non-global `autoRestartOnSecretChange` setting.
    # @default -- false
    autoRestartOnSecretChange: ""

  # -- Name override that may be used by subcharts, too.
  nameOverride: ""

  # -- Cluster-specific base settings, intended to be set centrally (e.g. via ArgoCD app values)
  # and move specific settings out of the base chart.
  # Individual charts can override these via chart-level settings (e.g. ingress.tls.*).
  baseSettings:
    tls:
      # -- Default cert-manager ClusterIssuer for internal ingresses.
      internalClusterIssuer: "step-ca-internal"
      # -- Default cert-manager ClusterIssuer for external ingresses.
      externalClusterIssuer: "letsencrypt-prod"
      # -- Generic fallback ClusterIssuer when neither internalClusterIssuer nor externalClusterIssuer is set.
      clusterIssuer: ""
    ingress:
      # -- Default IngressClass for the internal ingress (routed via the internal Traefik instance).
      internalClassName: "traefik"
      # -- Default IngressClass for the external ingress (routed via the external Traefik instance).
      externalClassName: "traefik-external"
    traefik:
      # -- Default Traefik middleware(s) for the internal ingress (unless disabled per-chart).
      # Pattern: `{{ namespace }}-{{ name }}@kubernetescrd`. Multiple middlewares comma-separated.
      internalDefaultMiddlewares: ""
      # -- Default Traefik middleware(s) for the external ingress (unless disabled per-chart).
      externalDefaultMiddlewares: ""

# -- you can use `"image.registry" + "image.repository"` to specify the docker-image or both with using `"image.name"`.
# set either `"image.registry" + "image.repository"` or `"image.name"`
# @default -- see below
image:
  # -- set either `"image.registry" + "image.repository"` or `"image.name"` 
  registry: "" 
  # -- set either `"image.registry" + "image.repository"` or `"image.name"`  
  repository: ""
  # -- set either `"image.registry" + "image.repository"` or `"image.name"` 
  name: ""
  # -- the docker image tag of the deployed image
  tag: ""
  # -- the pull policy for kubernetes
  pullPolicy: "IfNotPresent"
  # -- override the default command for the container (entrypoint)
  command: []
  # -- override the default arguments for the container
  args: []


# -- possibility to override the desired name of the helm manifest. The default Chart name is automaticly added as prefix
nameOverride: ""
# -- possibility to override the desired name of the helm manifest. This overrides the fullname.
# this value also sets the spring value spring.application.name
fullnameOverride: ""

# -- additional pod annotations
podAnnotations: {}


# -- default resource definition for the app. Have in mind that this has an impact to your jvm heap settings. For more information have a look at the [docs](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/)
# @default -- see below
resources:
  # -- limits define a threshold when kubernetes intervenes once it sees a violation.
  limits:
    cpu: ""
    memory: ""
  # -- the minimum resource that is available for your pod.
  requests:
    cpu: ""
    memory: ""

# -- definiton of how many pods you want to create.
replicaCount: 1
# -- how many old deployment revision histories you want to keep 
revisionHistoryLimit: 2

# -- Configure termination grace period for the pod in seconds.
# This is the time Kubernetes will wait after sending a termination signal before forcefully killing the pod.
terminationGracePeriodSeconds: ""

# -- possibility to specify a nodeSelector
nodeSelector: {}

# -- possibility to specify tolerations
tolerations: []

# -- possibility to specify affinity
affinity: {}

# -- define privilege and access control settings for a pod. For more information have a look at the [docs](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/)
podSecurityContext: {}

# -- Use `podSecurityContextPreset` if `podSecurityContext` is not set.
usePodSecurityContextPreset: true
# -- Preset for securityContext, will be used if `podSecurityContext` is not set 
# and `usePodSecurityContextPreset` is enabled.
podSecurityContextPreset:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 3000
  fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

# -- define privilege and access control settings for a pod. For more information have a look at the [docs](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/)
containerSecurityContext: {}

# -- Use `containerSecurityContextPreset` if `containerSecurityContext` is not set.
useContainerSecurityContextPreset: true
# Preset for securityContext, willbe used if `containerSecurityContext` is not set
# and `useContainerSecurityContextPreset` is enabled.
containerSecurityContextPreset:
  allowPrivilegeEscalation: false
  privileged: false
  #runAsNonRoot: true  # <-- only use preset in podSecurityContextPreset
  # -- Should be enabled if the container supports it.
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL


# -- General ingress settings
ingress:
  enabled: true
  className: ""

  name: ""

  host: ""
  path: /
  pathType: Prefix

  # -- Possibility to overwrite the destination service name.
  # @default -- The name of the default service.
  serviceName: ""
  # -- Possibility to overwrite the destination service port.
  # @default -- The port of the default service.
  servicePort: ""

  traefik:
    # -- Traefik middleware(s) applied to the internal ingress.
    # Pattern: `{{ namespace }}-{{ name }}@kubernetescrd`. Multiple middlewares comma-separated.
    middlewares: ""
    # -- Disable the global default middlewares (global.baseSettings.traefik.internalDefaultMiddlewares) for this ingress.
    disableDefaultMiddlewares: false

  # -- TLS settings for the internal ingress.
  tls:
    # -- Enable TLS on the internal ingress.
    enabled: true
    # -- cert-manager ClusterIssuer for the internal ingress.
    # Falls back to global.baseSettings.tls.internalClusterIssuer, then global.baseSettings.tls.clusterIssuer.
    clusterIssuer: ""

  # -- Opt-in for a separate external (public) ingress without the internal allowlist.
  # Deliberately disabled by default — must be an explicit decision.
  external:
    # -- Enable the external ingress. Requires `host` to be set and different from `ingress.host`.
    enabled: false
    # -- Hostname for the external ingress. Required when enabled; must differ from ingress.host.
    host: ""
    # -- TLS settings for the external ingress.
    tls:
      # -- Enable TLS on the external ingress.
      enabled: true
      # -- cert-manager ClusterIssuer for the external ingress.
      # Falls back to global.baseSettings.tls.externalClusterIssuer, then global.baseSettings.tls.clusterIssuer.
      clusterIssuer: ""
    # -- IngressClass for the external ingress. Falls back to global.baseSettings.ingress.externalClassName.
    className: ""
    traefik:
      # -- Traefik middleware(s) applied to the external ingress.
      # Pattern: `{{ namespace }}-{{ name }}@kubernetescrd`. Multiple middlewares comma-separated.
      middlewares: ""
      # -- Disable the global default middlewares (global.baseSettings.traefik.externalDefaultMiddlewares) for the external ingress.
      disableDefaultMiddlewares: false
    # -- Annotations for the external ingress only. Does not inherit ingress.annotations.
    annotations: {}

  # -- Custom annotations for the ingress
  annotations: {}


# -- definition for the deployed kubernetes service
# @default -- see below
service:
  enabled: true
  type: ClusterIP
  name: ""
  # -- default port where the ingress routes the traffic to the service
  port: 80
  # -- protocol to use (UDP/TCP)
  protocol: "TCP"
  # -- default port where the service routes the traffic to the pod. Your app has to service anything on this port. It sets the spring value `server.port` to the same value (as an ENV-Var in the configmap)
  targetPort: 8080
  externalIPs: []
  #ipFamilyPolicy: PreferDualStack

# -- Additional Kubernetes services configuration.
# This allows you to define extra services besides the default one.
# Each service can have its own ports and settings.
services:
  example:
    # -- Enable or disable this service.
    enabled: false
    # -- Type of the Kubernetes service (e.g., ClusterIP, NodePort, LoadBalancer).
    type: ClusterIP
    ports:
      example:
        # -- Enable or disable this port.
        enabled: true
        # -- Protocol for the service port (e.g., TCP, UDP).
        # @default -- TCP
        protocol: ""
        # -- Port exposed by the service.
        # @default -- none
        port: 80
        # -- Target port on the pod to route traffic to.
        # @default -- `.port`
        targetPort: 8080
    # -- List of external IPs for the service.
    externalIPs: []
    #ipFamilyPolicy: PreferDualStack

# -- configuration for the liveness probe. By default, the liveness probe is executed against `{{ .Values.actuator.port }}/{{ .Values.actuator.basePath }}/{{ .Values.actuator.contextPath }}/health/liveness`
# @default -- see below
livenessProbe:
  # -- enables or disables the liveness probe
  enabled: false

  # -- HTTP variant of the liveness probe. Runs against a path on a port.
  http:
    # -- Path for the liveness probe to check. Optional.
    # @default -- '/'
    path: ""
    # -- Port for the liveness probe to check.
    port: ""
  # TCP socket variant of the liveness probe. Runs against an open tcp port.
  tcp:
    # -- Port for the liveness probe to check.
    port: ""
  # Command exec variant of the liveness probe. Executes a command in the container.
  exec:
    # Command for the liveness probe to execute.
    command: ""

  # -- initial delay in seconds before the liveness probe starts checking. This is needed because the app needs some time to start up.
  initialDelaySeconds: 10
  # -- period in seconds after which the liveness probe checks again
  periodSeconds: 10
  # -- number of retries before the liveness probe fails and kubernetes restarts the pod
  failureThreshold: 5


# --configuration for the readiness probe. By default, the readiness probe is executed against `{{ .Values.actuator.port }}/{{ .Values.actuator.basePath }}/{{ .Values.actuator.contextPath }}/health/readiness`
# @default -- see below
readinessProbe: 
  # -- enables or disables the readiness probe
  enabled: false

  # -- HTTP variant of the readiness probe. Runs against a path on a port.
  http:
    # -- Path for the readiness probe to check. Optional.
    # @default -- '/'
    path: ""
    # -- Port for the readiness probe to check.
    port: ""
  # TCP socket variant of the readiness probe. Runs against an open tcp port.
  tcp:
    # -- Port for the readiness probe to check.
    port: ""
  # Command exec variant of the readiness probe. Executes a command in the container.
  exec:
    # Command for the readiness probe to execute.
    command: ""

  # -- initial delay in seconds before the readiness probe starts checking s
  initialDelaySeconds: 5
  # -- period in seconds after which the readiness probe checks again
  periodSeconds: 10
  # -- number of retries before the readiness probe fails and kubernetes restarts the pod
  failureThreshold: 3


prometheus:
  # -- Enable Prometheus scrape annotations on the pod.
  enabled: false
  # -- Scrape path for Prometheus.
  path: ""
  # -- Scrape port for Prometheus. Defaults to service.targetPort when empty.
  # @default -- `service.targetPort`
  port: ""
  

deployment:
  # -- Enable auto-restart of the deployment whenever secrets from 1password are changed.
  # The ESecret operator gracefully restarts the deployment by updating an annotation on the Pod template.
  # @default -- false
  autoRestartOnSecretChange: ""


# -- Possibility to specific configuration files or env variables.
config:
  # -- Enable or disable the configmap creation.
  enabled: true
  # -- Overwrite the default name of the configmap.
  name: ""
  # -- Specify how to mount the values.
  mount:
    # -- Add the key-value pairs from the config as environment variables.
    env: false
    # -- Mount the config as files in the container.
    path: ""
    # -- Assuming there is only one config file, mount its content directly into the specified path without creating a directory.
    subPath: ""
  # -- Key-value pairs for configuration.
  values: {}


# -- Possibility to add additional [environment variables](https://kubernetes.io/docs/tasks/inject-data-application/define-environment-variable-container/) to your application. 
env: {}
  # if you want pass kubernetes specific values to your app 
  #   KUBE_NAMESPACE: 
  #     valueFrom:
  #       fieldRef:
  #         fieldPath: metadata.namespace  
  # if you want to set additional env variables
  #   DEMO_GREETING: "Hello from the environment"
  #   DEMO_FAREWELL: 
  #     value: "Such a sweet sorrow"



# -- possibility to mount additional secrets, configmaps or volumemounts to your application. Have a look at the values.yaml below for examples.
# @default -- see below
extraConfig:
# extraConfig is used to load Environment Variables from Secrets and ConfigMaps
#
# These Secrets/ConfigMaps are expected to contain Key/Value pairs, such as:
#
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: some-external-configs
# data:
#   POSTGRES_USERNAME: foo
#   POSTGRES_JDBC_URL: jdbc:postgresql://db.example.com:5432/sonar
#
# These vars can then be injected into the environment by uncommenting the following:
#
# extraConfig:
#   configmaps:
#     - some-external-configs

  # -- DEPRECATED: Possibility to add additional [environment variables](https://kubernetes.io/docs/tasks/inject-data-application/define-environment-variable-container/) to your application. 
  # Use `env` instead of `extraConfig.env`.
  env: []
   # if you want pass kubernetes specific values to your app 
   # - name: KUBE_NAMESPACE
   #   valueFrom:
   #     fieldRef:
   #       fieldPath: metadata.namespace  
   # if you want to set additional env variables
   # - name: DEMO_GREETING
   #   value: "Hello from the environment"
   # - name: DEMO_FAREWELL
   #   value: "Such a sweet sorrow"

  # -- Possibility to add additional [secrets](https://kubernetes.io/docs/concepts/configuration/secret/) as `envFrom` to your application.
  # Specify the name of the secret that you want to mount. The secret must already exist in the namespace.
  # example:
  # ```
  # - my-secret
  # ```
  secrets: []
  # - my-secret # name of the secret that you want to mount, must already exist

  # -- Possibility to add additional [configmaps](https://kubernetes.io/docs/concepts/configuration/configmap/) as `envFrom` to your application.
  # Specify the name of the configmap that you want to mount. The configmap must already exist in the namespace.
  # example:
  # ```
  # - my-configmap
  # ```
  configmaps: []
  # - my-configmap # name of the configmap that you want to mount, must already exist

  # -- Advanced envFrom configuration for cases requiring optional or prefix settings.
  # For simple cases, use `secrets` or `configmaps` arrays above.
  # example:
  # ```
  # - secretRef:
  #     name: my-secret
  #     optional: true
  # - configMapRef:
  #     name: my-config
  #     prefix: APP_
  # ```
  envFrom: []

  # -- Possibility to add additional [volumemounts](https://kubernetes.io/docs/concepts/storage/volumes/) to your application.
  # Either specify a secretName or a configMap with items or nfs. have a look at the values.yaml below for examples.
  # Includes a volume definition, unless `existingVolume` is set, default is false.
  volumeMounts: []
    # --- required config for all variants ---:
    #- name: "" # choose a name of the volume
    #  mountPath: "" # path where you want the volume to be mounted in the container
    #  readOnly: "" # whether the volume is read-only or not

    # --- optional ---
    #  existingVolume: false
    
    # -- either `secretName` or `configMap` with items or `nfs` ---:

    ### configMap mount -- more information about configmaps [here](https://kubernetes.io/docs/concepts/storage/volumes/#configmap)
    #  configMap: "" # name of the configMap
    #  items: # list of items in the configMap that you want to mount
    #  - key: "" # key in the configMap
    #    path: "" # path where you want the item to be mounted in the container (relative to the mountPath) (name of the file that will be created in the container)
   
    ### secret mount -- more information about secrets [here](https://kubernetes.io/docs/concepts/storage/volumes/#secret)
    #  secretName: "" # name of the secret
    #  items: # list of items in the secret 
    #  - key: "" # key in the secret
    #    path: "" # path where you want the item to be mounted in the container (relative to the mountPath) (name of the file that will be created in the container)
    
    ### nfs mount -- more information about nfs [here](https://kubernetes.io/docs/concepts/storage/volumes/#nfs)
    #  nfs:
    #   server: "" # the address of the NFS server
    #   path: "" # the path on the NFS server
    
    ### emptyDir mount -- more information about emptyDir [here](https://kubernetes.io/docs/concepts/storage/volumes/#emptydir)
    #  emptyDir: {} # creates an emptyDir volume
    #  # Optional settings for emptyDir:
    #  # sizeLimit: "1Gi" # limit the size of the emptyDir volume
    #  # medium: "Memory" # use tmpfs (RAM) instead of disk storage

    ### pvc mount
    #  pvc: "" # name of an existing PersistentVolumeClaim to mount


# -- Settings for the ServiceAccount for this deployment. These are only applied if there is are any non-default roles (leader election or explicit role bindings).
# @default -- see below
serviceAccount:
  # -- Overwrite the default name of the service account for this backend.
  name: ""
  # -- Whether to create the service account or assume it already exists otherwise.
  create: true
  # -- Additional roles to bind to the service account.
  # List of objects, requiring the `name` of the role and optionally a `kind`, kind defaults to `Role`. Set to `ClusterRole` if required.
  roleBindings: []
   # - name: my-custom-external-role
   #   kind: Role / ClusterRole

# -- Postgres database configuration using the [postgresdb-user-operator](https://github.com/lunarys/postgresdb-user-operator).
# @default -- see below
postgresdb:
  # -- Enable or disable creation of a postgres database.
  enabled: false
  # -- Override the default name for the postgres database resource.
  # @default -- `<release-name>`
  nameOverride: ""
  # -- Deletion policy for the database when the Helm release is deleted. "Retain" will keep the database (in the postgres server), "Delete" will remove it.
  deletionPolicy: "Retain" # Retain or Delete
  # -- Name of the secret where the database credentials will be stored. The secret will be created in the same namespace as the Helm release.
  # The secret will contain the following keys: `username`, `password`, `host`, `port`, `dbname`, `uri`, `jdbc-uri`, `pgpass`.
  # @default -- Set by the operator to `<cr-name>-pgcreds`
  secretName: ""
  # -- Desired name for the Postgres database to be created by the operator.
  # @default -- Set by the operator to the CR name with hyphens replaced by underscores.
  databaseName: ""
  # -- Desired username for the Postgres database to be created by the operator.
  # @default -- Set by the operator to the CR name with hyphens replaced by underscores.
  username: ""
  # -- Specify which cloudnative-pg postgres cluster to use. Empty to use the default cluster configured in the operator.
  clusterRef:
    name: ""
    namespace: ""
  mount:
    enabled: true
    # -- Map the secret keys to env variables in the deployment. Use the keys from the secret and specify the desired env variable name: e.g. `{ username: "MY_DB_USER_ENV" }`.
    env: {}

#####################################
# -- child charts
#####################################
networkpolicy:
  enabled: false

localstorage:
  enabled: false

smbstorage:
  enabled: true
  # -- Multiple SMB volumes configuration (map with volume name as key)
  volumes:
    example:
      # -- Enable or disable this specific volume.
      # Setting this to `false` still adds it as a `volume` to the container, but omitting the `volumeMount`.
      enabled: false
      mount:
        # -- Enable mounting this volume in the container
        enabled: true
        # -- Mount path in the container
        path: ""
        # -- SubPath for mounting
        subPath: ""
        # -- Mount as read-only
        readonly: false
    init-default:
      enabled: false


longhornstorage:
  enabled: true
  # -- Multiple PVC configuration using map with key as volume name
  volumes:
    example:
      # -- Enable/disable this volume.
      enabled: false
      # -- Size of the storage request
      size: ""
      # -- Storage class variant to use (auto-delete, retain, encrypted)
      #variant: ""
      # -- Optional: Custom name for the PVC (defaults to {release-name}-{volume-key}-pvc)
      #name: ""
      # -- Optional: Bind to a specific PersistentVolume by name
      pvName: ""
      # -- Mount configuration for this volume
      mount:
        enabled: true
        path: ""
        subPath: ""
        readonly: false


# -- Settings for externalsecrets integration.
externalsecrets:
  mount:
    # -- Whether to mount the default secret as environment variables.
    env: false
    # -- Path to mount the secret as a file (not implemented).
    # TODO: not implemented
    mountPath: ""
  secrets:
    exampleSecret:
      mount: 
        # -- Whether to mount this secret as environment variables.
        # @default -- `true` for all but this example.
        env: false

initCopy:
  enabled: false
  fromVolume: ""
  toVolume: ""
  force: false
  sleep: ""


# -- Strategy for updating the deployment.
# This can be left empty to use the default Kubernetes strategy,
# or can be customized as needed.
update:
  strategy: {}
    #type: RollingUpdate | Recreate
    #rollingUpdate:
    #  maxSurge: 0
    #  maxUnavailable: 1


autoscale:
  enabled: false
