{{- if .Values.enabled }}
{{- range $name, $volume := .Values.volumes }}
{{- if (or (not (hasKey $volume "enabled")) $volume.enabled) }}
{{- $pvEnabled := true }}
{{- if hasKey $volume "pv" }}{{ $pvEnabled = (or (not (hasKey $volume.pv "enabled")) $volume.pv.enabled) }}{{ end }}
{{- if $pvEnabled }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "smbstorage.pvName" (dict "volume" $volume "volumeName" $name "Release" $.Release) | quote }}
  annotations:
    pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
spec:
  capacity:
    storage: {{ $volume.smb.capacity | required (printf "PV capacity is required: smb.capacity must be specified for volume '%s'" $name) }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete  # available values: Delete, Retain
  # empty to disable dynamic provisioning via storageclass
  storageClassName: ""
  {{- $pvcEnabled := true }}
  {{- if hasKey $volume "pvc" }}{{ $pvcEnabled = $volume.pvc.enabled }}{{ end }}
  {{- if $pvcEnabled }}
  claimRef:
    name: {{ include "smbstorage.pvcName" (dict "volume" $volume "volumeName" $name "Release" $.Release) | quote }}
    namespace: {{ $.Release.Namespace | quote }}
  {{- end }}
  mountOptions:
    {{- $mount := $volume.mount | default dict }}
    - dir_mode={{ $mount.dir_mode | default "0770" }}
    - file_mode={{ $mount.file_mode | default "0660" }}
    {{- if $mount.uid }}
    - uid={{ $mount.uid }}
    {{- end }}
    {{- if $mount.gid }}
    - gid={{ $mount.gid }}
    {{- end }}
    {{- if $mount.readonly }}
    - ro
    {{- end }}
    - noperm
    - mfsymlinks
    - cache=strict
    {{- if $mount.extraOptions }}
    {{- range $mount.extraOptions }}
    - {{ . }}
    {{- end }}
    {{- end }}
    - noserverino  # required to prevent data corruption
  csi:
    driver: smb.csi.k8s.io
    # volumeHandle format: {smb-server-address}#{sub-dir-name}#{share-name}
    # make sure this value is unique for every share in the cluster
    volumeHandle: "{{ $volume.smb.host }}/{{ $volume.smb.share }}##"
    volumeAttributes:
      source: {{ include "smbstorage.smbSource" (dict "volume" $volume) | quote }}
    nodeStageSecretRef:
      name: {{ include "smbstorage.secretName" (dict "volume" $volume "volumeName" $name "Release" $.Release) | quote }}
      {{- $secretNamespace := $.Release.Namespace }}
      {{- if and $volume.secret $volume.secret.namespace }}{{ $secretNamespace = $volume.secret.namespace }}{{ end }}
      namespace: {{ $secretNamespace | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

