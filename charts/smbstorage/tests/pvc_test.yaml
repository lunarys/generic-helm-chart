suite: smbstorage PersistentVolumeClaim

templates:
  - templates/pvc-static.yaml

tests:
  - it: should render PVC with minimal configuration (testing documented defaults)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-pvc-smb  # Auto-generated format as documented
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteMany
      - equal:
          path: spec.volumeName
          value: RELEASE-NAME-testdata-pv-smb
      - equal:
          path: spec.storageClassName
          value: ""
      # Should not have resources when mount.capacity defaults to empty as documented
      - equal:
          path: spec.resources.requests.storage
          value: "10Gi"

  - it: should render PVC respecting pvc.enabled default (true as documented)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          # pvc.enabled defaults to true according to values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim

  - it: should render PVC with resources when mount.capacity is explicitly set
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          mount:
            capacity: "5Gi"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: spec.resources.requests.storage
          value: "5Gi"

  - it: should not render PVC when volume.enabled is explicitly false
    set:
      enabled: true
      volumes:
        testdata:
          enabled: false  # Explicitly disabled as documented
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render PVC when pvc.enabled is explicitly false
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          pvc:
            enabled: false  # Override default true
    asserts:
      - hasDocuments:
          count: 0

  - it: should use auto-generated PVC name format as documented when name is empty  
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          pvc:
            name: ""  # Empty means auto-generated as documented
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-pvc-smb  # Format: {release-name}-{volume-key}-pvc-smb

  - it: should use custom PVC name when specified as documented
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          pvc:
            name: "custom-pvc-name"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: "custom-pvc-name"

  - it: should not render PVC when chart is disabled
    set:
      enabled: false
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
    asserts:
      - hasDocuments:
          count: 0

  - it: should render multiple PVCs for multiple volumes (testing map structure)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
        backup:
          smb:
            host: "backup-server.example.com"
            share: "backups"
            capacity: "100Gi"
    asserts:
      - hasDocuments:
          count: 2

  - it: should handle volume enabled by default (not explicitly set)
    set:
      enabled: true
      volumes:
        testdata:
          # enabled not specified - should default to enabled
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim