suite: smbstorage ExternalSecret

templates:
  - templates/externalsecret.yaml

tests:
  - it: should render ExternalSecret with minimal configuration (externalsecret.enabled defaults to true as documented)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            # enabled defaults to true according to values.yaml
            commonRemoteKey: "smb/testdata"
            fields:
              username:
                storeRefName: bitwarden-login
                remoteProperty: username
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - isAPIVersion:
          of: external-secrets.io/v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-smb-creds  # Auto-generated format as documented
      - isNotEmpty:
          path: metadata.name
      # Validate target configuration
      - equal:
          path: spec.target.name
          value: RELEASE-NAME-testdata-smb-creds
      - equal:
          path: spec.target.deletionPolicy
          value: Delete  # Default from externalsecret chart
      - equal:
          path: spec.target.template.type
          value: Opaque  # Default secret type
      # Validate data structure exists
      - exists:
          path: spec.data
      - isNotEmpty:
          path: spec.data
      # Validate template structure exists  
      - exists:
          path: spec.target.template.data
      - isNotEmpty:
          path: spec.target.template.data

  - it: should inject externalsecretFieldDefault when fields is not specified
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            commonRemoteKey: "smb/testdata"
            # fields not specified - should use externalsecretFieldDefault from values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-smb-creds
      # Validate that default fields are injected from externalsecretFieldDefault
      - exists:
          path: spec.data[?(@.secretKey=="username")]
      - equal:
          path: spec.data[?(@.secretKey=="username")].remoteRef.key
          value: "smb/testdata"  # Uses commonRemoteKey
      - equal:
          path: spec.data[?(@.secretKey=="username")].remoteRef.property
          value: "username"  # From externalsecretFieldDefault
      - exists:
          path: spec.data[?(@.secretKey=="password")]
      - equal:
          path: spec.data[?(@.secretKey=="password")].remoteRef.key
          value: "smb/testdata"
      - equal:
          path: spec.data[?(@.secretKey=="password")].remoteRef.property
          value: "password"  # From externalsecretFieldDefault
      # Domain field is static, so it only appears in spec.target.template.data, not in spec.data

  - it: should render ExternalSecret respecting documented defaults (using field injection)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            # Test documented default configuration
            commonRemoteKey: "smb/data"  # Default as shown in values.yaml
            # fields not specified - should use externalsecretFieldDefault from values.yaml automatically
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-smb-creds
      # Validate target configuration
      - equal:
          path: spec.target.name
          value: RELEASE-NAME-testdata-smb-creds
      # Validate that fields from externalsecretFieldDefault are used
      - exists:
          path: spec.data[?(@.secretKey=="username")]
      - equal:
          path: spec.data[?(@.secretKey=="username")].remoteRef.key
          value: "smb/data"  # Uses provided commonRemoteKey
      - equal:
          path: spec.data[?(@.secretKey=="username")].remoteRef.property
          value: "username"
      - exists:
          path: spec.data[?(@.secretKey=="password")]
      - equal:
          path: spec.data[?(@.secretKey=="password")].remoteRef.key
          value: "smb/data"
      - equal:
          path: spec.data[?(@.secretKey=="password")].remoteRef.property
          value: "password"

  - it: should not render ExternalSecret when explicitly disabled (override default true)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            enabled: false  # Override default true
            commonRemoteKey: "smb/testdata"
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render ExternalSecret when volume.enabled is explicitly false
    set:
      enabled: true
      volumes:
        testdata:
          enabled: false
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            commonRemoteKey: "smb/testdata"
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret by default when externalsecret section exists (enabled defaults to true)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            # enabled not specified - should default to true as documented
            commonRemoteKey: "smb/testdata"
            # fields not specified - should use externalsecretFieldDefault from values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-smb-creds
      # Validate that externalsecret is enabled by default and fields are injected
      - exists:
          path: spec.data[?(@.secretKey=="username")]
      - equal:
          path: spec.data[?(@.secretKey=="username")].remoteRef.key
          value: "smb/testdata"
      - equal:
          path: spec.data[?(@.secretKey=="username")].sourceRef.storeRef.name
          value: "bitwarden-login"  # Default storeRefName from externalsecretFieldDefault

  - it: should use explicit fields when specified (overriding externalsecretFieldDefault)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            commonRemoteKey: "smb/testdata"
            fields:
              # Explicit fields should override externalsecretFieldDefault from values.yaml
              username:
                storeRefName: custom-store
                remoteProperty: custom-username
              password:
                storeRefName: custom-store
                remoteProperty: custom-password
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      # Validate that explicit fields override defaults
      - exists:
          path: spec.data[?(@.secretKey=="username")]
      - equal:
          path: spec.data[?(@.secretKey=="username")].remoteRef.key
          value: "smb/testdata"  # Uses commonRemoteKey
      - equal:
          path: spec.data[?(@.secretKey=="username")].remoteRef.property
          value: "custom-username"  # From explicit fields, not default "username"
      - exists:
          path: spec.data[?(@.secretKey=="password")]
      - equal:
          path: spec.data[?(@.secretKey=="password")].remoteRef.key
          value: "smb/testdata"
      - equal:
          path: spec.data[?(@.secretKey=="password")].remoteRef.property
          value: "custom-password"  # From explicit fields, not default "password"
      # Domain field should not exist since not specified in explicit fields
      - notExists:
          path: spec.data[?(@.secretKey=="domain")]

  - it: should use auto-generated externalsecret name format as documented when name is empty
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            name: ""  # Empty means auto-generated as documented
            commonRemoteKey: "smb/testdata"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-smb-creds  # Format: {release-name}-{volume-key}-smb-creds
      - equal:
          path: spec.target.name
          value: RELEASE-NAME-testdata-smb-creds  # Target name should match ExternalSecret name
      # Validate basic ExternalSecret structure
      - exists:
          path: spec.data
      - exists:
            path: spec.target.template

  - it: should use custom externalsecret name when specified as documented
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            name: "custom-externalsecret-name"
            commonRemoteKey: "smb/testdata"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: "custom-externalsecret-name"
      - equal:
          path: spec.target.name
          value: "custom-externalsecret-name"  # Target name should match custom name
      # Validate that custom name doesn't break other functionality
      - exists:
          path: spec.data
      - isNotEmpty:
          path: spec.data

  - it: should not render ExternalSecret when chart is disabled
    set:
      enabled: false
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            commonRemoteKey: "smb/testdata"
    asserts:
      - hasDocuments:
          count: 0

  - it: should render multiple ExternalSecrets for multiple volumes (testing map structure)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            commonRemoteKey: "smb/testdata"
        backup:
          smb:
            host: "backup-server.example.com"
            share: "backups"
            capacity: "100Gi"
          externalsecret:
            commonRemoteKey: "smb/backup"
    asserts:
      - hasDocuments:
          count: 2
      # Validate both ExternalSecrets have proper field injection
      - contains:
          path: spec.data
          content:
            secretKey: "username"
            remoteRef:
              key: "smb/testdata"
              property: "username"
            sourceRef:
              storeRef:
                name: "bitwarden-login"
                kind: "ClusterSecretStore"
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-testdata-smb-creds
      - contains:
          path: spec.data
          content:
            secretKey: "username"
            remoteRef:
              key: "smb/backup"
              property: "username"
            sourceRef:
              storeRef:
                name: "bitwarden-login"
                kind: "ClusterSecretStore"
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-backup-smb-creds

  - it: should merge global and volume-specific externalsecret configurations as documented
    set:
      enabled: true
      externalsecrets:
        # Global externalsecrets config as documented
        enabled: true
        deletionPolicy: Retain
        secretType: kubernetes.io/basic-auth
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            commonRemoteKey: "smb/testdata"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - isAPIVersion:
          of: external-secrets.io/v1
      # Validate that global configuration is properly merged
      - equal:
          path: spec.target.deletionPolicy
          value: Retain  # From global externalsecret config
      - equal:
          path: spec.target.template.type
          value: kubernetes.io/basic-auth  # From global externalsecret config
      # Validate volume-specific config takes precedence
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-smb-creds  # Volume-specific naming
      # Validate that field injection still works with global config
      - exists:
          path: spec.data[?(@.secretKey=="username")]
      - equal:
          path: spec.data[?(@.secretKey=="username")].remoteRef.key
          value: "smb/testdata"  # From volume-specific commonRemoteKey

  - it: should handle volume enabled by default (testing implicit behavior)
    set:
      enabled: true
      volumes:
        testdata:
          # enabled not specified - should default to enabled
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            commonRemoteKey: "smb/testdata"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-smb-creds

  - it: should validate ExternalSecret structure and required fields
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          externalsecret:
            commonRemoteKey: "smb/testdata"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - isAPIVersion:
          of: external-secrets.io/v1
      # Validate required metadata
      - exists:
          path: metadata.name
      - isNotEmpty:
          path: metadata.name
      # Validate required spec structure
      - exists:
          path: spec
      - exists:
          path: spec.target
      - exists:
          path: spec.target.name
      - exists:
          path: spec.data
      # Validate target structure
      - exists:
          path: spec.target.template
      - exists:
          path: spec.target.template.type
      - exists:
          path: spec.target.template.data
      - exists:
          path: spec.target.deletionPolicy
      # Validate data array has proper structure
      - exists:
          path: spec.data[0]
      - exists:
          path: spec.data[0].secretKey
      - exists:
          path: spec.data[0].remoteRef
      - exists:
          path: spec.data[0].sourceRef