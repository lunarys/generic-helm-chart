suite: smbstorage Secret

templates:
  - templates/secret.yaml

tests:
  - it: should NOT render Secret with minimal configuration (secret.enabled defaults to false as documented)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          # secret.enabled defaults to false according to values.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render Secret when explicitly enabled with user credentials
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          secret:
            enabled: true
            # User must provide actual credentials (examples in values.yaml are not defaults)
            user: "testuser"
            password: "testpass"
            domain: "TESTDOMAIN"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - isAPIVersion:
          of: v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-smb-creds  # Auto-generated format as documented
      - equal:
          path: metadata.namespace
          value: NAMESPACE  # Defaults to release namespace as documented
      - equal:
          path: type
          value: Opaque
      # Validate stringData is used (plain text, not base64)
      - equal:
          path: stringData.username
          value: "testuser"
      - equal:
          path: stringData.password
          value: "testpass"
      - equal:
          path: stringData.domain
          value: "TESTDOMAIN"
      # Ensure data section doesn't exist (stringData is used instead)
      - notExists:
          path: data

  - it: should render Secret with domain default when not specified
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          secret:
            enabled: true
            user: "testuser"
            password: "testpass"
            # domain not specified - should default to "WORKGROUP"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: stringData.domain
          value: "WORKGROUP"  # Template default

  - it: should not render Secret when using default (secret.enabled defaults to false)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          secret:
            # secret.enabled not specified - should default to false
            user: "testuser"
            password: "testpass"
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Secret when volume.enabled is explicitly false
    set:
      enabled: true
      volumes:
        testdata:
          enabled: false
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          secret:
            enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should render Secret in custom namespace as documented
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          secret:
            enabled: true
            namespace: "custom-ns"  # Override default release namespace
            user: "testuser"
            password: "testpass"
            domain: "TESTDOMAIN"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.namespace
          value: "custom-ns"

  - it: should use auto-generated secret name format when name is empty
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          secret:
            enabled: true
            name: ""  # Empty means auto-generated as documented
            user: "testuser"
            password: "testpass"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-testdata-smb-creds  # Format: {release-name}-{volume-key}-smb-creds
      - equal:
          path: stringData.username
          value: "testuser"
      - equal:
          path: stringData.password
          value: "testpass"

  - it: should use custom secret name when specified
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          secret:
            enabled: true
            name: "custom-secret-name"
            user: "testuser"
            password: "testpass"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: "custom-secret-name"
      - equal:
          path: stringData.username
          value: "testuser"
      - equal:
          path: stringData.password
          value: "testpass"

  - it: should not render Secret when chart is disabled
    set:
      enabled: false
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          secret:
            enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should render multiple Secrets for multiple volumes (testing map structure)
    set:
      enabled: true
      volumes:
        testdata:
          smb:
            host: "test-server.example.com"
            share: "testshare"
            capacity: "10Gi"
          secret:
            enabled: true
            user: "testuser"
            password: "testpass"
        backup:
          smb:
            host: "backup-server.example.com"
            share: "backups"
            capacity: "100Gi"
          secret:
            enabled: true
            user: "backupuser"
            password: "backuppass"
    asserts:
      - hasDocuments:
          count: 2