# This chart creates PersistentVolume and PersistentVolumeClaim resources for SMB storage.
# It is only used to mount smb shares into containers, not dynamically provision storage on a smb share.

# - pv: pv + pvc (static provisioning)
# - pvc with existing (external) pv
# - ephemeral volumes: https://kubernetes.io/docs/concepts/storage/ephemeral-volumes/#generic-ephemeral-volumes

# TODO: capacity is required

# -- Enable or disable the chart
enabled: true

# -- Multiple SMB volumes configuration (map with volume name as key)
volumes: 
  # Example volume configuration (disabled by default, usually volumes enabled by default when specified)
  example:
    # -- Enable or disable this specific volume
    # @default -- `true`
    enabled: false  # Set to true to enable this volume (defaults to true when not specified)
    smb:
      # -- SMB server hostname or IP
      host: "smb-server.example.com"
      # -- SMB share name
      share: "data"
      # -- Total available capacity for the share (e.g., 50Gi)
      # Currently (2025-09-20) not enforced by the smb provisioner, but required to be set.
      capacity: "50Gi"
      # -- Alternatively, specify the full SMB source URI
      #source: "//smb-server.example.com/data"
    mount:
      # -- Requested capacity for the PVC. Defaults to `smb.capacity`.
      capacity: ""
      # -- Directory mode for mounted volume.
      # This is the mount mode for directories inside the container.
      # The directories should be usable by the user/group in the container.
      # @default -- `0770`
      dir_mode: ""
      # -- File mode for mounted volume.
      # This is the mount mode for files inside the container.
      # The files should be usable by the user/group in the container.
      # @default -- `0660`
      file_mode: ""
      # -- UID for mounted volume inside the container.
      # Uses root (0) by default.
      uid: ""
      # -- GID for mounted volume inside the container.
      # The driver uses `fsGroup` from `securityContext` by default, if set, otherwise uses root (0) as default.
      # A default of `2000` is applied by this chart as when using the default from fsGroup the driver overwrites the file_mode with group RWX.
      # @default -- `2000`
      gid: ""
      # -- Mount as read-only
      readonly: false
      # -- Additional mount options
      extraOptions: []
    pv:
      # -- Enable PersistentVolume creation
      enabled: true
      # -- Name of the PersistentVolume (auto-generated if empty)
      name: ""  # Auto-generated: {release-name}-{volume-key}-pv-smb
    pvc:
      # -- Enable PersistentVolumeClaim creation
      enabled: true
      # -- Name of the PersistentVolumeClaim (auto-generated if empty)
      name: ""  # Auto-generated: {release-name}-{volume-key}-pvc-smb
    secret:
      # -- Create Kubernetes Secret with SMB credentials
      enabled: false
      # -- Name of the Secret (auto-generated if empty)
      name: ""  # Auto-generated: {release-name}-{volume-key}-smb-creds
      # -- Namespace for the Secret (defaults to release namespace)
      namespace: ""
      # -- SMB username
      user: "username"
      # -- SMB password
      password: "password"
      # -- SMB domain
      domain: "WORKGROUP"
    externalsecret:
      # -- Use ExternalSecrets to create SMB credentials Secret
      enabled: true
      # -- Name of the ExternalSecret (auto-generated if empty)
      name: ""  # Auto-generated: {release-name}-{volume-key}-smb-creds
      # -- Common remote key prefix for credentials
      commonRemoteKey: "smb/data"
      # -- Field mappings for ExternalSecrets
      # @default -- see `externalsecretFieldsDefault`
      fields:
        username:
          # -- External secret store reference name
          storeRefName: bitwarden-login
          # -- Property name in the external secret
          remoteProperty: username
        password:
          storeRefName: bitwarden-login
          remoteProperty: password
        domain:
          # -- Static value for domain
          static: "WORKGROUP"

  # -- Default smb-share I use to provide files that should be copies to another volume on container init.
  # Is handled specifically in the mount of the initContainer of the generic-service wrapper chart.
  init-default:
    enabled: false
    smb:
      host: erolas.elda
      share: "k8s-prod-init"
      capacity: "10Gi"
    mount:
      # does not need to be mounted by the main container, only the initContainer
      enabled: false
    externalsecret:
      # bitwarden secret containing user and password for the smb share
      # for test user k8s-test-init with remote key "33df0a50-c169-4242-97c2-b33b00dbe4ca"
      commonRemoteKey: "adc837a8-05e3-4a99-95a1-b35e01515b56"


# Default to be used when fields for externalsecret are not defined.
# Assuming it will most use this structure.
# @default -- see below
externalsecretFieldDefault:
  username:
    storeRefName: bitwarden-login
    remoteProperty: username
  password:
    storeRefName: bitwarden-login
    remoteProperty: password
  domain:
    static: "WORKGROUP"
