suite: Test ExternalSecret Multiple Secrets

templates:
  - externalsecret.yaml

tests:
  - it: should render multiple ExternalSecrets when secrets is defined
    set:
      enabled: true
      secrets:
        secret1:
          name: my-secret-1
          fields:
            USERNAME:
              storeRefName: bitwarden-login
              remoteProperty: username
            PASSWORD:
              storeRefName: bitwarden-login
              remoteProperty: password
        secret2:
          name: my-secret-2
          fields:
            API_KEY:
              storeRefName: bitwarden-fields
              remoteProperty: api-key
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: my-secret-1
        documentIndex: 0
      - equal:
          path: metadata.name
          value: my-secret-2
        documentIndex: 1

  - it: should use default name pattern when name not specified in secrets
    set:
      enabled: true
      secrets:
        secret1:
          fields:
            USERNAME: "static-value"
        secret2:
          fields:
            PASSWORD: "another-static"
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: "secret1"
        documentIndex: 0
      - equal:
          path: metadata.name
          value: "secret2"
        documentIndex: 1

  - it: should render correct fields for each secret
    set:
      enabled: true
      secrets:
        secret1:
          fields:
            USERNAME:
              storeRefName: my-store
              remoteProperty: username
            STATIC_VALUE: "my-static-value"
        secret2:
          fields:
            API_KEY:
              storeRefName: another-store
              remoteProperty: api-key
    asserts:
      - exists:
          path: spec.data[?(@.secretKey=="USERNAME")]
        documentIndex: 0
      - equal:
          path: spec.data[?(@.secretKey=="USERNAME")].sourceRef.storeRef.name
          value: my-store
        documentIndex: 0
      - equal:
          path: spec.target.template.data.STATIC_VALUE
          value: my-static-value
        documentIndex: 0
      - exists:
          path: spec.data[?(@.secretKey=="API_KEY")]
        documentIndex: 1
      - equal:
          path: spec.data[?(@.secretKey=="API_KEY")].sourceRef.storeRef.name
          value: another-store
        documentIndex: 1

  - it: should not render any secrets when secrets is empty
    set:
      enabled: true
      secrets: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should inherit commonRemoteKey in multiple secrets
    set:
      enabled: true
      commonRemoteKey: "shared-uuid-123"
      secrets:
        secret1:
          fields:
            USERNAME:
              storeRefName: bitwarden-login
              remoteProperty: username
        secret2:
          fields:
            PASSWORD:
              storeRefName: bitwarden-login
              remoteProperty: password
    asserts:
      - equal:
          path: spec.data[?(@.secretKey=="USERNAME")].remoteRef.key
          value: "shared-uuid-123"
        documentIndex: 0
      - equal:
          path: spec.data[?(@.secretKey=="PASSWORD")].remoteRef.key
          value: "shared-uuid-123"
        documentIndex: 1

  - it: should allow overriding commonRemoteKey in individual secrets
    set:
      enabled: true
      commonRemoteKey: "shared-uuid-123"
      secrets:
        secret1:
          fields:
            USERNAME:
              storeRefName: bitwarden-login
              remoteProperty: username
              remoteKey: "override-uuid-456"
        secret2:
          commonRemoteKey: "override-789"
          fields:
            PASSWORD:
              storeRefName: bitwarden-login
              remoteProperty: password
              # This should use the common remoteKey
    asserts:
      - equal:
          path: spec.data[?(@.secretKey=="USERNAME")].remoteRef.key
          value: "override-uuid-456"
        documentIndex: 0
      - equal:
          path: spec.data[?(@.secretKey=="PASSWORD")].remoteRef.key
          value: "override-789"
        documentIndex: 1
