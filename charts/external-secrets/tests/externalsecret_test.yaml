suite: Test ExternalSecret Helm Chart

templates:
  - externalsecret.yaml

tests:
  - it: should not render when disabled
    set:
      enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set metadata.name from release name by default
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-external-secret

  - it: should set metadata.name from name value
    set:
      name: my-secret
    asserts:
      - equal:
          path: metadata.name
          value: my-secret

  - it: should set target.name from targetName value
    set:
      name: my-secret
      targetName: my-target-secret
    asserts:
      - equal:
          path: spec.target.name
          value: my-target-secret

  - it: should use deletionPolicy and secretType defaults
    asserts:
      - equal:
          path: spec.target.deletionPolicy
          value: Delete
      - equal:
          path: spec.target.template.type
          value: Opaque

  - it: should use commonRemoteKey as default for remoteKey
    set:
      commonRemoteKey: test-common-key
      fields:
        foo:
          enabled: true
          storeRefName: bitwarden-login
          remoteProperty: foo
    asserts:
      - equal:
          path: spec.data[0].remoteRef.key
          value: test-common-key

  - it: should override remoteKey per field
    set:
      commonRemoteKey: test-common-key
      fields:
        foo:
          enabled: true
          storeRefName: bitwarden-login
          remoteKey: override-key
          remoteProperty: foo
    asserts:
      - equal:
          path: spec.data[0].remoteRef.key
          value: override-key

  - it: should use map key as default for remoteProperty
    set:
      fields:
        foo:
          enabled: true
          storeRefName: bitwarden-login
    asserts:
      - equal:
          path: spec.data[0].remoteRef.property
          value: foo

  - it: should use remoteProperty when specified
    set:
      fields:
        bar:
          enabled: true
          storeRefName: bitwarden-login
          remoteProperty: custom
    asserts:
      - equal:
          path: spec.data[0].remoteRef.property
          value: custom

  - it: should only render enabled fields
    set:
      fields:
        foo:
          enabled: true
          storeRefName: bitwarden-login
        bar:
          enabled: false
          storeRefName: bitwarden-login
    asserts:
      - lengthEqual:
          path: spec.data
          count: 1
      - equal:
          path: spec.data[0].secretKey
          value: foo

  - it: should render static value in template.data and not in spec.data
    set:
      enabled: true
      name: test-secret
      fields:
        STATIC_FIELD:
          static: "my-static-value"
        REMOTE_FIELD:
          storeRefName: my-store
          remoteProperty: my-remote
    asserts:
      - equal:
          path: spec.target.template.data.STATIC_FIELD
          value: my-static-value
      - notExists:
          path: spec.data[?(@.secretKey=="STATIC_FIELD")]
      - exists:
          path: spec.data[?(@.secretKey=="REMOTE_FIELD")]
      - equal:
          path: spec.data[?(@.secretKey=="REMOTE_FIELD")].sourceRef.storeRef.name
          value: my-store
      - equal:
          path: spec.data[?(@.secretKey=="REMOTE_FIELD")].remoteRef.property
          value: my-remote

  - it: should render static value when field is set directly to a string
    set:
      enabled: true
      name: test-secret
      fields:
        STATIC_FIELD: "my-direct-static-value"
        REMOTE_FIELD:
          storeRefName: my-store
          remoteProperty: my-remote
    asserts:
      - equal:
          path: spec.target.template.data.STATIC_FIELD
          value: my-direct-static-value
      - notExists:
          path: spec.data[?(@.secretKey=="STATIC_FIELD")]
      - exists:
          path: spec.data[?(@.secretKey=="REMOTE_FIELD")]
      - equal:
          path: spec.data[?(@.secretKey=="REMOTE_FIELD")].sourceRef.storeRef.name
          value: my-store
      - equal:
          path: spec.data[?(@.secretKey=="REMOTE_FIELD")].remoteRef.property
          value: my-remote