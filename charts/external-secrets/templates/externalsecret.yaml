{{- if .Values.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.name | default (printf "%s-external-secret" .Release.Name) }}
spec:
  target:
    name: {{ coalesce .Values.targetName .Values.name (printf "%s-external-secret" .Release.Name) }}
    deletionPolicy: {{ .Values.deletionPolicy }}
    template:
      type: {{ .Values.secretType }}
      data:
{{- range $key, $val := .Values.fields }}
{{- if (hasKey $val "enabled") | ternary $val.enabled true }}
        {{ $key }}: |-
          {{ printf "{{ .%s }}" $key | nindent 10 }}
{{- end }}
{{- end }}
  data:
{{- range $key, $val := .Values.fields }}
{{- if (hasKey $val "enabled") | ternary $val.enabled true }}
    - secretKey: {{ $key }}
      sourceRef:
        storeRef:
          name: {{ $val.storeRefName | default "bitwarden-login" }}
          kind: {{ $val.storeRefKind | default "ClusterSecretStore" }}
      remoteRef:
        key: {{ $val.remoteKey | default $.Values.commonRemoteKey }}
        property: {{ $val.remoteProperty | default $key }}
{{- end }}
{{- end }}
{{- end }}

