{{- define "external-secrets.secret" }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .name }}
spec:
  target:
    name: {{ coalesce .values.targetName .name }}
    deletionPolicy: {{ .values.deletionPolicy }}
    template:
      type: {{ .values.secretType }}
      data:
{{- range $key, $val := .values.fields }}
{{- if or (kindIs "string" $val) ((hasKey $val "enabled") | ternary $val.enabled true) }}
        {{ $key }}: |-
          {{- if kindIs "string" $val }}
          {{ $val }}
          {{- else if $val.static }}
          {{ $val.static }}
          {{- else }}
          {{ printf "{{ .%s }}" $key }}
          {{- end }}
{{- end }}
{{- end }}
  data:
{{- range $key, $val := .values.fields }}
{{- if or (kindIs "string" $val) ((hasKey $val "enabled") | ternary $val.enabled true) }}
  {{- if not (or (kindIs "string" $val) $val.static) }}
    - secretKey: {{ $key }}
      sourceRef:
        storeRef:
          name: {{ $val.storeRefName | default "bitwarden-login" }}
          kind: {{ $val.storeRefKind | default "ClusterSecretStore" }}
      remoteRef:
        key: {{ $val.remoteKey | default $.values.commonRemoteKey }}
        property: {{ $val.remoteProperty | default $key }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- if .Values.enabled }}
  {{- if include "external-secrets.hasEnabledFields" . }}
    {{- include "external-secrets.secret" (set (dict "values" .Values) "name" (default (printf "%s-external-secret" .Release.Name) .Values.name)) }}
  {{- end }}
  
  {{- if .Values.secrets }}
    {{- range $key, $value := .Values.secrets }}
      {{- if or (not (hasKey $value "enabled")) $value.enabled }}
        {{- include "external-secrets.secret" (set (dict "values" (mustMerge $value $.Values)) "name" (default $key $value.name)) }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
