global:
  nameOverride: ""

# -- Enable or disable the chart and all resources
enabled: true

# -- Name of the CiliumNetworkPolicy resource
name: ""

defaults:
  # -- Default CIDR for local subnet isolation
  localSubnetCidr: 10.0.0.0/20
  # -- Ingress controller namespace to allow traffic from
  ingressControllerNamespace: traefik
  # -- Include host and remote-nodes, when ingress from kube API is allowed.
  # Ingress from the kube API, presumably in particular remote nodes, does not
  # seem to be reliably labelled as such, leading to errors.
  # This has been observed mostly on mutation/validation webhook calls.
  extendedKubeApiIngressRule: true
  # -- Value to use for labels that allow ingress from other pods.
  fromNetworkLabelValue: "ingress"
  # -- Value to use for labels that allow egress to other pods.
  toNetworkLabelValue: "egress"


# -- Preset configuration for common network policy patterns
preset:
  # -- Enable the preset network policy template
  enabled: true
  # -- Name of the preset CiliumNetworkPolicy resource
  name: ""

  # -- Endpoint selector to target specific pods, defaults to all pods in the namespace.
  endpointSelector: {}

  # -- Use a predefined endpointSelector that matches only pods deployed with the same chart.
  # This can be useful if multiple services are deployed in the same namespace.
  useChartEndpointSelector: false

  # -- Enable namespace isolation (allow traffic only within the same namespace)
  namespaceIsolation: true

  # -- Ingress traffic configuration
  ingress:
    # -- Allow all ingress traffic (policy section will be omitted)
    unrestricted: false
    # -- Allow ingress from all cluster entities
    fromCluster: false
    # -- Allow ingress from a specific namespace
    fromNamespace: ""
    # -- Same as `fromNamespace`, but takes a list of namespaces.
    fromNamespaces: []
    # -- Allow ingress from the world (external traffic)
    fromWorld: false
    # -- Allow ingress from local subnet CIDR
    fromLocalSubnet: false
    # -- Allow ingress from ingress controller
    fromIngressController: true
    # -- Allow ingress from the kube API
    # Includes the k8s node and remote nodes, if `defaults.extendedKubeApiIngressRule` is set.
    fromKubeApi: false
    # -- Define labels that should be allowed to access this workload.
    # The value for the labels is `ingress` for the incoming side
    # and `egress` for the outgoing side (from `defaults`).
    # Either set as a list of strings (labels),
    # or as objects with `label` and `ports` keys,
    # expecting a label string and port numbers.
    fromNetworkLabels: []
    # -- Allow all ingress traffic (adds '- {}' rule)
    none: false
    # -- Custom ingress rules (array of rule objects)
    rules: []

  # -- Egress traffic configuration
  egress:
    # -- Allow all egress traffic (policy section will be omitted)
    unrestricted: false
    # -- Allow egress to all cluster entities
    toCluster: false
    # -- Allow egress to a specific namespace
    toNamespace: ""
    # -- Same as `toNamespace`, but takes a list of namespaces.
    toNamespaces: []
    # -- Allow egress to the world (external traffic)
    toWorld: false
    # -- Allow egress to local subnet CIDR
    toLocalSubnet: false
    # -- Allow egress to Kubernetes API server
    toKubeApi: false
    # -- Allow egress to kube-dns for DNS resolution
    toKubeDns: true
    # -- Allow egress to the specified FQDNs
    toFQDNs: []
    # Define labels that this workload should be allowed to access.
    # The value for the labels is `ingress` for the incoming side
    # and `egress` for the outgoing side (from `defaults`).
    # Either set as a list of strings (labels),
    # or as objects with `label` and `ports` keys,
    # expecting a label string and port numbers.
    toNetworkLabels: []
    # -- Allow all egress traffic (adds '- {}' rule)
    none: false
    # -- Custom egress rules (array of rule objects)
    rules: []


