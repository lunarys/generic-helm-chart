suite: Test CronJob Basic Configuration

templates:
  - cronjob.yaml

tests:
  - it: should render CronJob with default schedule
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.schedule
          value: "0 * * * *"

  - it: should render custom schedule
    set:
      schedule: "0 2 * * *"
    asserts:
      - equal:
          path: spec.schedule
          value: "0 2 * * *"

  - it: should render timezone when set
    set:
      timeZone: "America/New_York"
    asserts:
      - equal:
          path: spec.timeZone
          value: "America/New_York"

  - it: should not render timezone when empty
    set:
      timeZone: ""
    asserts:
      - notExists:
          path: spec.timeZone

  - it: should render concurrencyPolicy
    set:
      concurrencyPolicy: "Forbid"
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: "Forbid"

  - it: should render suspend state
    set:
      suspend: true
    asserts:
      - equal:
          path: spec.suspend
          value: true

  - it: should render history limits
    set:
      successfulJobsHistoryLimit: 5
      failedJobsHistoryLimit: 3
    asserts:
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 5
      - equal:
          path: spec.failedJobsHistoryLimit
          value: 3

  - it: should render startingDeadlineSeconds when set
    set:
      startingDeadlineSeconds: 300
    asserts:
      - equal:
          path: spec.startingDeadlineSeconds
          value: 300

  - it: should not render startingDeadlineSeconds when empty
    set:
      startingDeadlineSeconds: ""
    asserts:
      - notExists:
          path: spec.startingDeadlineSeconds

  - it: should render backoffLimit
    set:
      backoffLimit: 6
    asserts:
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 6

  - it: should render completions when set
    set:
      completions: 3
    asserts:
      - equal:
          path: spec.jobTemplate.spec.completions
          value: 3

  - it: should not render completions when empty
    set:
      completions: ""
    asserts:
      - notExists:
          path: spec.jobTemplate.spec.completions

  - it: should render parallelism when set
    set:
      parallelism: 2
    asserts:
      - equal:
          path: spec.jobTemplate.spec.parallelism
          value: 2

  - it: should not render parallelism when empty
    set:
      parallelism: ""
    asserts:
      - notExists:
          path: spec.jobTemplate.spec.parallelism

  - it: should render activeDeadlineSeconds when set
    set:
      activeDeadlineSeconds: 600
    asserts:
      - equal:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
          value: 600

  - it: should not render activeDeadlineSeconds when empty
    set:
      activeDeadlineSeconds: ""
    asserts:
      - notExists:
          path: spec.jobTemplate.spec.activeDeadlineSeconds

  - it: should render ttlSecondsAfterFinished when set
    set:
      ttlSecondsAfterFinished: 86400
    asserts:
      - equal:
          path: spec.jobTemplate.spec.ttlSecondsAfterFinished
          value: 86400

  - it: should not render ttlSecondsAfterFinished when empty
    set:
      ttlSecondsAfterFinished: ""
    asserts:
      - notExists:
          path: spec.jobTemplate.spec.ttlSecondsAfterFinished

  - it: should render restartPolicy with default Never
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: "Never"

  - it: should render custom restartPolicy
    set:
      restartPolicy: "OnFailure"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: "OnFailure"

  # Name override tests
  - it: should use nameOverride when set
    set:
      nameOverride: "custom-name"
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ^.*-custom-name$

  - it: should use fullnameOverride when set
    set:
      fullnameOverride: "completely-custom"
    asserts:
      - equal:
          path: metadata.name
          value: "completely-custom"
