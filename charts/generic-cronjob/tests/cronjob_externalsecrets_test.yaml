suite: Test CronJob ExternalSecrets Configuration

templates:
  - cronjob.yaml

tests:
  # Test default behavior for primary externalsecrets - mount.env defaults to false
  - it: should not mount externalsecrets with default mount.env (false)
    set:
      externalsecrets:
        enabled: true
    asserts:
      - exists:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          value: null

  - it: should mount externalsecrets when enabled with mount.env explicitly set to true
    set:
      externalsecrets:
        enabled: true
        mount:
          env: true
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: RELEASE-NAME-cronjob-external-secret

  - it: should use custom externalsecrets name
    set:
      externalsecrets:
        enabled: true
        name: "my-custom-secret"
        mount:
          env: true
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-custom-secret

  - it: should not mount externalsecrets when disabled
    set:
      externalsecrets:
        enabled: false
        mount:
          env: true
    asserts:
      - exists:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          value: null

  - it: should not mount externalsecrets when enabled but mount.env is false
    set:
      externalsecrets:
        enabled: true
        mount:
          env: false
    asserts:
      - exists:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          value: null

  # Test additional secrets - mount defaults to true when not specified
  - it: should mount additional secret with default mount (true) when mount not specified
    set:
      externalsecrets:
        enabled: true
        secrets:
          mySecret:
            enabled: true
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: mySecret

  - it: should mount additional externalsecrets secrets with explicit mount.env true
    set:
      externalsecrets:
        enabled: true
        mount:
          env: true
        secrets:
          mySecret:
            enabled: true
            mount:
              env: true
    asserts:
      - lengthEqual:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          count: 2

  - it: should use custom name for additional secrets
    set:
      externalsecrets:
        enabled: true
        mount:
          env: true
        secrets:
          mySecretKey:
            enabled: true
            name: "custom-secret-name"
            mount:
              env: true
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: custom-secret-name

  - it: should use key as name when no custom name specified
    set:
      externalsecrets:
        enabled: true
        mount:
          env: true
        secrets:
          my-secret-key:
            enabled: true
            mount:
              env: true
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-secret-key

  - it: should not mount additional secret when enabled is false
    set:
      externalsecrets:
        enabled: true
        mount:
          env: true
        secrets:
          disabledSecret:
            enabled: false
            mount:
              env: true
    asserts:
      - lengthEqual:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          count: 1

  - it: should not mount additional secret when mount.env is false
    set:
      externalsecrets:
        enabled: true
        secrets:
          mySecret:
            enabled: true
            mount:
              env: false
    asserts:
      - exists:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          value: null

  - it: should work with both externalsecrets and config envFrom
    set:
      externalsecrets:
        enabled: true
        mount:
          env: true
      config:
        enabled: true
        mount:
          env: true
        values:
          app.yaml: "content"
    asserts:
      - lengthEqual:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          count: 2
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: RELEASE-NAME-cronjob-external-secret
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: RELEASE-NAME-generic-cronjob-config
