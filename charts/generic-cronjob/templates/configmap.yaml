{{- if and .Values.config.enabled .Values.config.values }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.name | default (printf "%s-config" (include "generic-cronjob.fullname" .)) }}
  labels:
    {{- include "generic-cronjob.labels" . | nindent 4 }}
data:
{{- range $key, $value := .Values.config.values }}
  {{ $key }}: |-
    {{- if kindIs "map" $value }}
      {{- $value | toYaml | nindent 4 }}
    {{- else }}
      {{- $value | nindent 4 }}
    {{- end }}
{{- end }}
{{- end }}
