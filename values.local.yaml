global:
  ingress:
    host: "localhost"

image:
  registry: ""
  repository: "applications/playground/dfl-test"
  tag: "1.0.0-green"
  pullPolicy: "IfNotPresent"

imagePullSecrets:
  - name: regcred

nameOverride: ""
fullnameOverride: ""

resources:
  limits:
    cpu: 2000m
    memory: 2000Mi
  requests:
    cpu: 100m
    memory: 300Mi

replicaCount: 1
revisionHistoryLimit: 2
podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

ingress:
  enabled: true
  path: "wedding"
  host: "localhost"
  annotations:
    nginx.ingress.kubernetes.io/custom-http-errors: '404,415'

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080


prometheus: #enables prometheus scrape config
  enabled: false


extraConfig:
  env:
    - name: KUBE_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace  
  secrets: []
  configmaps: []
  volumeMounts:
    - name: "test"
      mountPath: "/path"
      nfs:
       server: "lalilu"
       path: "/path"


serviceAccount:
  roleBindings:
    - name: my-special-role
    - name: some-global-role
      kind: ClusterRole


nodeSelector: {}

tolerations: []

affinity: {}

initCopy:
  enabled: true
  #fromVolume: smb
  toVolume: longhorn

smbstorage:
  volumes:
    init-default:
      enabled: true

networkpolicy:
  enabled: true
  preset:
    useChartEndpointSelector: true
    ingress:
      fromNetworkLabels:
        - custom.network/identifier
      fromExternalIngressController: true
    egress:
      toDefaultPostgresDb: true

update:
  strategy:
    type: Recreate
